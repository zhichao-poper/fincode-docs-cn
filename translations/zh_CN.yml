  PlatformRateConfig:
    platform_rate: |-
      标准平台使用费率。未单独设置费率的租户使用 `id` 指定的支付方式时适用此费率。
      如需为特定租户设置单独费率，请使用“更新租户商户”API。
    fixed_fee: 使用 `examination_master_id` 指定的支付方式时，如果按 `platform_rate` 计算的费用低于此值，则适用此标准最低平台使用费。
