  ShopInfo.V2:
    shop_name: fincode 中登记的商户名称。
    shop_name_kana: fincode 中登记的商户名称（片假名）。
    shop_name_en: fincode 中登记的商户英文名称。
    support_mail: |-
      面向购买者的客服电子邮箱地址。
      格式：RFC 5322。
    support_tel: |-
      面向购买者的客服电话号码。
      格式：不含连字符的电话号码。
    unit_price: |-
      单笔支付的商品或服务单价。

      示例：`1000`（1000 日元）
    deals_long_apply_content: |-
      是否经营需要较长 fincode 审核时间的商品或服务。

      - `true`：经营此类商品或服务
      - `false`：不经营此类商品或服务

      经营以下内容时必须指定为 `true`：和服、咨询服务、美容护理/美容院/医疗美容、体育设施/健身俱乐部、文化学校/函授课程、数据销售、以信息本身为商品的信息内容、占卜、营养补充剂/健康食品、美容用品/化妆品、假发、属于旅行业的服务、烟草/CBD、捐款。
    deals_insecure_content: |-
      是否确认不经营 fincode 禁止处理的商品或服务。

      - `true`：没有经营禁止品类的计划
      - `false`：计划经营禁止品类

      fincode 禁止经营的品类如下：

      - 金融行为，例如信用卡购物额度套现
      - 虚拟货币交易、票券（包括印花税票和邮票）、商品券、预付卡、有价证券
      - 赌博及博彩
      - RMT（真实货币交易）
      - 宠物等所有活体，包括标本和剥制品
      - 布施
      - 危险药物及设计师药物
      - 无处方购买处方药，例如 Lumigan、Latisse、Glash Vista、Careprost 等
      - 可能侵犯第三方著作权、肖像权或知识产权的商品或内容
      - 违反公序良俗的商品或服务，包括成人内容和交友网站
      - 违反法律法规的商品或服务，包括违反枪刀法、麻药取缔法、华盛顿公约或药事法的内容
    lost_trial: |-
      是否存在依据日本修订分期付款销售法提起诉讼并败诉的历史。

      - `true`：不存在败诉记录
      - `false`：存在败诉记录
    used_on_web: |-
      是否在网站或 Web 应用中使用 fincode。

      - `true`：在网站或 Web 应用中使用 fincode
    used_on_app: |-
      是否在原生应用中使用 fincode。

      - `true`：在原生应用中使用 fincode
    site_published: |-
      网站公开状态，表示 fincode 审核时能否访问提供支付功能的网站。
      当 `usage_of_fincode.used_on_web` 为 `true` 时必填。

      - `true`：fincode 审核团队可以访问网站
      - `false`：fincode 审核团队无法访问网站
    url: fincode 审核团队用于访问网站的 URL。
    credential: fincode 审核团队访问网站所需的登录信息。
    site_info: 使用 fincode 支付的网站信息，供 fincode 审核团队核查。
    prepaid_point: 是否在商户中使用预付积分。
    how_to_use: 预付积分的使用方式。
    about_expiration: 预付积分的有效期说明。
    provides: 经营商品或服务的信息。
    product: 是否销售实物商品。
    service: 是否提供服务类商品。
    digital_contents: 是否销售数字内容。
    content_description: 商户所提供商品或服务的说明。
    product_content_info: |-
      实物商品信息。网站尚未公开时，需要提供经营商品的详细信息。
      当 `use_of_fincode.used_on_web` 或 `site_published` 为 `false`，且 `provides.product` 为 `true` 时必填。
    service_content_info: |-
      服务类商品信息。网站尚未公开时，需要提供经营服务的详细信息。
      当 `use_of_fincode.used_on_web` 或 `site_published` 为 `false`，且 `provides.service` 为 `true` 时必填。
    digital_content_info: |-
      数字内容商品信息。网站尚未公开时，需要提供经营内容的详细信息。
      当 `use_of_fincode.used_on_web` 或 `site_published` 为 `false`，且 `provides.digital_contents` 为 `true` 时必填。
    additional_info: |-
      补充提交信息。开始审核时，如果商户网站尚未公开，即 `use_of_fincode.used_on_web` 或 `site_published` 为 `false`，需要补充提供本信息。
      请根据日本《特定商业交易法》要求展示的信息填写。
    shop_sales_manager_name: 商户销售负责人的姓名。
    shop_service_name: 商号或服务名称。
    shop_how_to_pay: 商户可使用的支付方式。
    shop_charge_description: 商品价格之外的费用说明，例如运费、手续费和消费税。
    shop_product_delivery_time: 商品交付时间说明。
    shop_return_goods_handing_conditions: 退货及换货条件说明。
