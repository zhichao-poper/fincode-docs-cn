  PaymentBulk:
    id: 批量支付 ID。
    process_plan_date: |-
      批量支付的计划处理日期。`pay_type = Card` 时必填。
      格式：`yyyy/MM/dd`
    file_name: 批量支付数据文件名。
    process_start_date: |-
      批量支付开始处理的时间。
      格式：`yyyy/MM/dd HH:mm:ss.SSS`
    process_end_date: |-
      批量支付处理结束时间。
      格式：`yyyy/MM/dd HH:mm:ss.SSS`
    total_count: 批量支付中包含的支付总数。
    process_success_count: 批量支付处理成功的支付数量。
    process_failure_count: 批量支付处理失败的支付数量。
    error_code: 批量支付最近一次错误的错误代码。定义参见[错误代码](https://docs.fincode.jp/develop_support/error)。
    file: |-
      记录批量支付信息的 JSON 文件。各参数格式遵循支付登记和支付执行 API，`*` 表示必填。

      `pay_type = Card` 时上传以下结构：

      ```json
      {
        "data": [
          {
            "id": "order_001",
            "amount": "1000",
            "tax": "100",
            "customer_id": "c_**********************",
            "card_id": "cs_**********************",
            "client_field_1": "自由字段1",
            "client_field_2": "自由字段2",
            "client_field_3": "自由字段3"
          }
        ]
      }
      ```

      - `data`：支付信息数组
      - `data[].id`：订单 ID
      - `data[].amount`：使用金额*
      - `data[].tax`：税费及运费
      - `data[].customer_id`：客户 ID*
      - `data[].card_id`：银行卡 ID
      - `data[].client_field_1`～`data[].client_field_3`：商户自由字段

      `pay_type = Virtualaccount` 时上传以下结构：

      ```json
      {
        "data": [
          {
            "id": "order_001",
            "billing_amount": "1000",
            "billing_tax": "100",
            "customer_id": "c_**********************",
            "payment_method_id": "pm_**********************",
            "client_field_1": "自由字段1",
            "client_field_2": "自由字段2",
            "client_field_3": "自由字段3"
          },
          {
            "id": "order_002",
            "billing_amount": "1000",
            "payment_term_day": "2",
            "reference_order_id": "order_101",
            "use_exact_deposit_amount": true
          }
        ]
      }
      ```

      - `data`：支付信息数组
      - `data[].id`：订单 ID
      - `data[].billing_amount`：请款金额*
      - `data[].billing_tax`：请款税费及运费
      - `data[].customer_id`：客户 ID
      - `data[].payment_method_id`：支付方式 ID
      - `data[].client_field_1`～`data[].client_field_3`：商户自由字段
      - `data[].payment_term_day`：支付期限天数
      - `data[].reference_order_id`：用于复用虚拟账户的订单 ID
      - `data[].use_exact_deposit_amount`：可入账金额设置
