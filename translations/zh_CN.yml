    使用金额。
    与 `tax` 的合计值必须处于该支付方式规定的支付金额范围内。
    参阅：[银行账户自动扣款 > 限制事项 > 可用金额](https://docs.fincode.jp/payment/directdebit/restriction)
  /components/schemas/Payment.DirectDebit.ChangingAmount.Request/properties/tax/description: |-
    税费及运费。
    与 `amount` 的合计值必须处于该支付方式规定的支付金额范围内。
    参阅：[银行账户自动扣款 > 限制事项 > 可用金额](https://docs.fincode.jp/payment/directdebit/restriction)
  /paths/~1v1~1payments/get/summary: 支付列表查询
  /paths/~1v1~1payments/get/description: 获取支付信息列表。
  /paths/~1v1~1payments/get/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    获取与该租户商户关联的支付信息列表。
  /paths/~1v1~1payments/get/parameters/1/description: 查询支付列表时使用的查询条件参数。
  /paths/~1v1~1payments/post/summary: 登记支付
  /paths/~1v1~1payments/post/description: 向 fincode 登记支付信息。登记成功时尚未向客户收款。
  /paths/~1v1~1payments/post/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    以指定租户商户为销售主体登记支付。该租户必须已经通过 `pay_type` 所指定支付方式的签约审核。
  /paths/~1v1~1payments~1{id}/put/summary: 执行支付
  /paths/~1v1~1payments~1{id}/put/description: 对已登记到 fincode 的指定支付信息执行收款。
  /paths/~1v1~1payments~1{id}/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，对 `id` 指定的支付执行支付处理。
  /paths/~1v1~1payments~1{id}/get/summary: 获取支付
  /paths/~1v1~1payments~1{id}/get/description: 获取指定的支付信息。
  /paths/~1v1~1payments~1{id}/get/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，获取 `id` 指定的支付信息。
  /paths/~1v1~1payments~1{id}/get/parameters/2/description: 获取支付信息时使用的查询条件参数。
  /paths/~1v1~1payments~1{id}~1capture/put/summary: 确认销售额
  /paths/~1v1~1payments~1{id}~1capture/put/description: |-
    对 `status` 为预授权（`AUTHORIZED`）或已取消（`CANCELED`）的支付确认销售额。
    成功后，状态将变为 `CAPTURED`，并计入以该时点为统计基准的销售款入账。
  /paths/~1v1~1payments~1{id}~1capture/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，对 `id` 指定的支付确认销售额。
  /paths/~1v1~1payments~1{id}~1cancel/put/summary: 取消支付
  /paths/~1v1~1payments~1{id}~1cancel/put/description: |-
    取消支付。取消成功后，`status` 将变为已取消（`CANCELED`）。

    向用户退款的处理方式等会因支付方式而异。
    详情请参阅 [Docs > 支付](/payment)。
  /paths/~1v1~1payments~1{id}~1cancel/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，取消 `id` 指定的支付。
  /paths/~1v1~1payments~1{id}~1auth/put/summary: 重新授权支付
  /paths/~1v1~1payments~1{id}~1auth/put/description: |-
    重新执行支付授权。

    此操作可用于 `pay_type` 为 `Card` 且 `status` 为 `CANCELED` 的支付（已取消的卡片支付），并沿用首次支付的信息重新申请授权。
  /paths/~1v1~1payments~1{id}~1auth/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，对 `id` 指定的支付重新执行授权。
  /paths/~1v1~1payments~1{id}~1change/put/summary: 变更支付金额
  /paths/~1v1~1payments~1{id}~1change/put/description: |-
    变更支付的使用金额。
    对已确认销售额的支付会变更实际收款金额；对仍处于预授权状态的支付会变更占用的信用额度。
  /paths/~1v1~1payments~1{id}~1change/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，变更 `id` 指定支付的使用金额。
  /paths/~1v1~1payments~1{id}~1barcode/put/summary: 生成条形码
  /paths/~1v1~1payments~1{id}~1barcode/put/description: 根据请求设备的信息，重新生成便利店支付条形码。
  /paths/~1v1~1payments~1{id}~1barcode/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的便利店支付中，为 `id` 指定的支付重新生成条形码。
  /paths/~1v1~1sessions/post/summary: 创建支付页面 URL
  /paths/~1v1~1sessions/post/description: 创建由 fincode 提供的重定向式支付页面，并返回该支付页面的 URL。
  /paths/~1v1~1sessions/post/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在指定的租户商户上执行支付。
  /paths/~1v1~1card_sessions/post/summary: 创建卡片登记页面 URL
  /paths/~1v1~1card_sessions/post/description: 创建由 fincode 提供的重定向式卡片登记页面，并返回该登记页面的 URL。
  /paths/~1v1~1card_sessions/post/parameters/0/description: |-
    <span class="smallText color--red-400">仅不共享客户信息的平台主商户可指定</span>
    租户商户 ID。
    创建卡片登记页面 URL，用于为指定租户商户名下的客户登记卡片。
  /paths/~1v1~1plans/post/summary: 登记套餐
  /paths/~1v1~1plans/post/description: 登记套餐信息。
  /paths/~1v1~1plans/get/summary: 套餐列表查询
  /paths/~1v1~1plans/get/description: 获取套餐信息列表。可通过查询参数缩小获取范围。
  /paths/~1v1~1plans/get/parameters/0/description: 查询套餐信息列表时使用的查询条件参数。
  /paths/~1v1~1plans~1{id}/get/summary: 获取套餐
  /paths/~1v1~1plans~1{id}/get/description: 获取由 ID 指定的套餐信息。
  /paths/~1v1~1plans~1{id}/put/summary: 更新套餐
  /paths/~1v1~1plans~1{id}/put/description: |-
    更新由 ID 指定的套餐信息。
    套餐已被一个或多个订阅使用时（`used_flag = 1`），不可更新该套餐。
  /paths/~1v1~1plans~1{id}/delete/summary: 删除套餐
  /paths/~1v1~1plans~1{id}/delete/description: |-
    删除由 ID 指定的套餐信息。
    即使套餐已被一个或多个订阅使用（`used_flag = 1`），也可以删除。
    删除套餐不会影响已经登记的订阅。
  /paths/~1v1~1subscriptions/post/summary: 登记订阅
  /paths/~1v1~1subscriptions/post/description: 为 `customer_id` 指定的客户登记订阅，并应用 `plan_id` 指定的套餐。
  /paths/~1v1~1subscriptions/get/summary: 订阅列表查询
  /paths/~1v1~1subscriptions/get/description: 获取订阅信息列表。可通过查询参数缩小获取范围。
  /paths/~1v1~1subscriptions/get/parameters/0/description: 查询订阅信息列表时使用的查询条件参数。
  /paths/~1v1~1subscriptions~1{id}/get/summary: 获取订阅
  /paths/~1v1~1subscriptions~1{id}/get/description: 获取由 ID 指定的订阅信息。
  /paths/~1v1~1subscriptions~1{id}/put/summary: 更新订阅
  /paths/~1v1~1subscriptions~1{id}/put/description: |-
    更新由 ID 指定的订阅信息。
    仅更新请求中指定的参数。
    订阅已完成首次收费时（`start_date ≤ {{当前时间}}`），不可更新该订阅。
  /paths/~1v1~1subscriptions~1{id}/delete/summary: 取消订阅
  /paths/~1v1~1subscriptions~1{id}/delete/description: 取消由 ID 指定的订阅，并停止后续收费。
  /paths/~1v1~1subscriptions~1{id}~1result/get/summary: 订阅结果列表查询
  /paths/~1v1~1subscriptions~1{id}~1result/get/description: 获取订阅产生的收费结果列表。可通过查询参数缩小获取范围。
  /paths/~1v1~1subscriptions~1{id}~1result/get/parameters/0/description: 查询订阅结果列表时使用的查询条件参数。
  /paths/~1v1~1payments~1bulk/get/summary: 批量支付列表查询
  /paths/~1v1~1payments~1bulk/get/description: 获取已登记到 fincode 的批量支付信息列表。
  /paths/~1v1~1payments~1bulk/get/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    获取以指定租户商户为销售主体的批量支付信息列表。
  /paths/~1v1~1payments~1bulk/get/parameters/1/description: 查询批量支付信息列表时使用的查询条件参数。
  /paths/~1v1~1payments~1bulk/post/summary: 登记批量支付
  /paths/~1v1~1payments~1bulk/post/description: 通过 JSON 格式文件向 fincode 登记批量支付信息，并预约在 `process_plan_date` 指定的时间执行批量支付。
  /paths/~1v1~1payments~1bulk/post/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    批量登记以指定租户商户为销售主体的支付信息。
  /paths/~1v1~1payments~1bulk~1{id}/get/summary: 批量支付明细列表查询
  /paths/~1v1~1payments~1bulk~1{id}/get/description: 获取由 ID 指定的批量支付明细（每笔支付的信息），以及各笔支付发生的错误信息。
  /paths/~1v1~1payments~1bulk~1{id}/get/parameters/0/description: |-
    批量支付 ID。
    指定需要获取明细的批量支付信息 ID。
  /paths/~1v1~1payments~1bulk~1{id}/get/parameters/1/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    获取以指定租户商户为销售主体的批量支付明细列表。
  /paths/~1v1~1payments~1bulk~1{id}/get/parameters/2/description: 查询批量支付信息列表时使用的查询条件参数。
  /paths/~1v1~1payments~1bulk~1{id}/delete/summary: 删除批量支付
  /paths/~1v1~1payments~1bulk~1{id}/delete/description: |-
    删除由 ID 指定的批量支付信息。
    仅可删除批量支付处理已检查完毕（`status` 为 `CHECKED`）的记录。
  /paths/~1v1~1payments~1bulk~1{id}/delete/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    删除以指定租户商户为销售主体的批量支付信息。
  /paths/~1v1~1payments~1bulk~1{id}/delete/parameters/1/description: |-
    批量支付 ID。
    指定要删除的批量支付信息 ID。
  /paths/~1v1~1invoices/get/summary: 账单列表查询
  /paths/~1v1~1invoices/get/description: 获取账单信息列表。可通过查询参数缩小获取范围。
  /paths/~1v1~1invoices/get/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    获取以指定租户商户为开具方的账单信息列表。
  /paths/~1v1~1invoices/get/parameters/1/description: 搜索条件查询参数。
  /paths/~1v1~1invoices/post/summary: 创建账单
  /paths/~1v1~1invoices/post/description: |-
    创建账单信息。
    交易内容、使用的支付方式等输入项目也可以在创建后通过“更新账单”API 填写。
    调用“发出账单”API 前不会开始收款。
  /paths/~1v1~1invoices/post/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    创建以指定租户商户为开具方的账单信息。
  /paths/~1v1~1invoices~1{id}/get/summary: 获取账单
  /paths/~1v1~1invoices~1{id}/get/description: 获取具有指定 ID 的账单信息。
  /paths/~1v1~1invoices~1{id}/get/parameters/1/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    指定后可获取该租户商户的账单信息。
  /paths/~1v1~1invoices~1{id}/put/summary: 更新账单
  /paths/~1v1~1invoices~1{id}/put/description: |-
    更新具有指定 ID 的账单信息。
    调用“发出账单”API 前不会开始收款。发出后仅可更新难以回收标志和商户自定义字段。
  /paths/~1v1~1invoices~1{id}/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    更新以指定租户商户为销售主体的账单信息。
  /paths/~1v1~1invoices~1{id}/delete/summary: 删除账单
  /paths/~1v1~1invoices~1{id}/delete/description: |-
    删除具有指定 ID 且处于草稿状态的账单信息。
    已发出的账单不可删除。
  /paths/~1v1~1invoices~1{id}/delete/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    删除以指定租户商户为销售主体的账单信息。
  /paths/~1v1~1invoices~1{id}~1open/put/summary: 发出账单
  /paths/~1v1~1invoices~1{id}~1open/put/description: |-
    根据 ID 指定的账单信息开始收款，包括生成账单 Web 页面 URL、向付款客户发送邮件等操作。
    调用此 API 后，“更新账单”API 仅可更新难以回收标志和商户自定义字段。
  /paths/~1v1~1invoices~1{id}~1open/put/parameters/1/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    对以指定租户商户为开具方的账单执行收款。
  /paths/~1v1~1invoices~1{id}~1cancel/put/summary: 取消账单
  /paths/~1v1~1invoices~1{id}~1cancel/put/description: |-
    取消具有指定 ID 且已发出的账单信息。
    取消表示撤回收款请求，已经取消的账单不可再次用于收款。
  /paths/~1v1~1invoices~1{id}~1cancel/put/parameters/1/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    取消以指定租户商户为开具方的账单。
  /paths/~1v1~1invoices~1{id}~1paid_externally/put/summary: 标记为外部付款
  /paths/~1v1~1invoices~1{id}~1paid_externally/put/description: |-
    将具有指定 ID 的已发出账单标记为通过 fincode 支付功能以外的方式完成付款。
    该账单的状态将变为付款完成（`PAID`），外部付款标志（`is_paid_externally`）将变为 `true`。
  /paths/~1v1~1invoices~1{id}~1paid_externally/put/parameters/1/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    更新以指定租户商户为开具方的账单。
  /paths/~1v1~1invoices~1{id}~1virtual_account~1refresh/put/summary: 重新分配账单虚拟账户
  /paths/~1v1~1invoices~1{id}~1virtual_account~1refresh/put/description: 如果分配给指定账单的虚拟账户已过期并关闭，则重新分配一个新的虚拟账户。
  /paths/~1v1~1accounts/get/summary: 销售款入账列表查询
  /paths/~1v1~1accounts/get/description: 获取销售款入账信息列表。可通过查询参数缩小获取范围。
  /paths/~1v1~1accounts/get/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    获取该租户商户的销售款入账信息列表。
  /paths/~1v1~1accounts/get/parameters/1/description: 查询销售款入账信息列表时使用的查询条件参数。
  /paths/~1v1~1accounts~1{id}/get/summary: 获取销售款入账
  /paths/~1v1~1accounts~1{id}/get/description: |-
    获取由 ID 指定的销售款入账信息。
    其中包含从 `aggregate_term_start` 至 `aggregate_term_end` 期间的销售额汇总结果。

    如需获取汇总中的每一条记录，请使用“销售款入账明细列表查询”API。
  /paths/~1v1~1accounts~1{id}/get/parameters/1/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    获取该租户商户的销售款入账信息中由 ID 指定的记录。
  /paths/~1v1~1accounts~1{id}~1detail/get/summary: 销售款入账明细列表查询
  /paths/~1v1~1accounts~1{id}~1detail/get/description: |-
    获取与 ID 指定的销售款入账关联的明细列表。
    每条销售款入账明细对应一笔支付、取消、拒付或拒付撤销调整。
  /paths/~1v1~1accounts~1{id}~1detail/get/parameters/1/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    获取该租户商户由 ID 指定的销售款入账记录的明细。
  /paths/~1v1~1accounts~1{id}~1detail/get/parameters/2/description: 查询销售款入账明细列表时使用的查询条件参数。
  /paths/~1v1~1platform_accounts/get/summary: 平台使用费收入列表查询
  /paths/~1v1~1platform_accounts/get/description: 获取平台使用费产生的销售款入账信息列表。可通过查询参数缩小获取范围。
  /paths/~1v1~1platform_accounts/get/parameters/0/description: 查询平台使用费产生的销售款入账信息列表时使用的查询条件参数。
  /paths/~1v1~1platform_accounts~1{id}/get/summary: 获取平台使用费收入
  /paths/~1v1~1platform_accounts~1{id}/get/description: |-
    获取由 ID 指定的平台使用费销售款入账信息。
    其中包含从 `aggregate_term_start` 至 `aggregate_term_end` 期间由平台使用费产生的销售额汇总结果。

