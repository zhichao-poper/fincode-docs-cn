  ? |-
    <span class="smallText color--blue-400">[3Dセキュア認証パラメータ]</span>\
    商品の注文が初回か再注文か

    - `01`: 初回注文
    - `02`: 再注文
  : |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    商品订单是首次下单还是再次下单。

    - `01`：首次下单
    - `02`：再次下单
  ? |-
    <span class="smallText color--blue-400">[3Dセキュア認証パラメータ]</span>\
    ※ サブスクリプションなど継続課金型のビジネスモデルのみ\
    継続課金の終了日\
    形式：`YYYYMMDD`
  : |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅适用于订阅等持续收费业务模式。
    持续收费结束日期。
    格式：`YYYYMMDD`
  ? |-
    <span class="smallText color--blue-400">[3Dセキュア認証パラメータ]</span>\
    ※ サブスクリプションなど継続課金型のビジネスモデルのみ\
    継続課金の課金間隔の日数（最小）
  : |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅适用于订阅等持续收费业务模式。
    持续收费的最小收费间隔天数。
  ? |-
    <span class="smallText color--blue-400">[3Dセキュア認証パラメータ]</span>\
    ※ プリペイドカードまたはギフトカードを購入する場合のみ\
    プリペイドカードまたはギフトカードの総購入金額
  : |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅限购买预付卡或礼品卡时使用。
    预付卡或礼品卡的购买总金额。
  ? |-
    <span class="smallText color--blue-400">[3Dセキュア認証パラメータ]</span>\
    ※ プリペイドカードまたはギフトカードを購入する場合のみ\
    購入したプリペイドカードまたはギフトカードの総数
  : |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅限购买预付卡或礼品卡时使用。
    已购买预付卡或礼品卡的总数量。
  ? |-
    <span class="smallText color--blue-400">[3Dセキュア認証パラメータ]</span>\
    ※ プリペイドカードまたはギフトカードを購入する場合のみ\
    プリペイドカードまたはギフトカードの通貨コード。\
    形式：ISO 4217 numeric\
    \
    以下の通貨コードは利用できません。（債券市場単位等）\
    `955`, `956`, `957`, `958`, `959`, `960`, `961`, `962`, `963`, `964`, `999`
  : |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅限购买预付卡或礼品卡时使用。
    预付卡或礼品卡的货币代码。
    格式：ISO 4217 numeric

    不可使用以下货币代码（债券市场单位等）：
    `955`, `956`, `957`, `958`, `959`, `960`, `961`, `962`, `963`, `964`, `999`
  ? |-
    <span class="smallText color--blue-400">[3Dセキュア認証パラメータ]</span>\
    取引商品の配送方法

    - `01`: 顧客の請求先住所に配送
    - `02`: 加盟店が保持している確認済み住所（請求先住所でない）に配送
    - `03`: 顧客の請求先住所と異なる住所に配送
    - `04`: 店舗への配送（店舗の住所は配送先住所で指定）
    - `05`: デジタル商品（オンラインサービス、電子ギフトカードおよび償還コードを含む）
    - `06`: 配送なし（旅行およびイベントのチケット）
    - `07`: その他（ゲーム、配送されないデジタルサービス、電子メディアの購読料など）
  : |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    交易商品的配送方式。

    - `01`：配送至客户账单地址
    - `02`：配送至商户保存的其他已验证地址
    - `03`：配送至与客户账单地址不同的地址
    - `04`：配送至门店（门店地址通过收货地址指定）
    - `05`：数字商品（包括在线服务、电子礼品卡及兑换码）
    - `06`：无需配送（旅行及活动门票）
    - `07`：其他（游戏、无需配送的数字服务、电子媒体订阅费等）

