  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/target_date_from/description: |-
    扣款指定日期（起始值）。
    按扣款指定日期（`target_date`）进行范围查询，获取扣款指定日期不早于此日期的支付信息。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/target_date_to/description: |-
    扣款指定日期（结束值）。
    按扣款指定日期（`target_date`）进行范围查询，获取扣款指定日期不晚于此日期的支付信息。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/withdrawal_date_from/description: |-
    实际扣款日期（起始值）。
    按实际扣款日期（`withdrawal_date`）进行范围查询，获取不早于此日期完成扣款的支付信息。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/withdrawal_date_to/description: |-
    实际扣款日期（结束值）。
    按实际扣款日期（`withdrawal_date`）进行范围查询，获取不晚于此日期完成扣款的支付信息。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/result_code/description: |-
    扣款结果码。
    获取符合指定扣款结果的支付信息。使用逗号分隔可指定多个值（OR 查询）。

    - `0`：扣款成功
    - `1`：余额不足（失败）
    - `2`：无存款账户交易（失败）
    - `3`：购买者原因（失败）
    - `4`：扣款申请书未送达或内容有误（失败）
    - `7`：数据错误（失败）<br /><span class="smallText">仅适用于每月 1、5、20、26 日扣款的服务。</span>
    - `8`：商户原因（失败）
    - `9`：其他原因（失败）
    - `E`：数据错误（失败）<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span>
    - `N`：未收到扣款结果（失败）<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span>
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/pay_pattern/description: |-
    收费类型。
    获取符合指定收费类型的支付信息。使用逗号分隔可指定多个值（OR 查询）。

    - `onetime`：非订阅的一次性支付
    - `subscription`：订阅支付
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/subscription_id/description: |-
