  ? |-
    fincodeに正常にWebhookを受信した旨をレスポンスしてください。
  : 请返回响应，告知 fincode 已成功接收 Webhook。
  ? |-
    4xx系、5xx系または上記以外のレスポンスを返却した場合、fincodeはエラーと判断しWebhook通知のリトライを行います。
  : 返回 4xx、5xx 或上述成功响应以外的响应时，fincode 会判定为错误并重试 Webhook 通知。
  ? |-
    この決済において発生したエラーのうち、一番最新のエラーのエラーコードです。\
    [各エラーコードの定義はこちらを参照](https://docs.fincode.jp/develop_support/error)して確認できます。
  : |-
    本次支付发生的错误中，最近一次错误的错误码。
    各错误码的定义请参阅[错误码说明](https://docs.fincode.jp/develop_support/error)。
  ? |-
    決済種別\
    この決済で利用する決済手段です。

    - `Card`: カード
  : |-
    支付类型。
    本次支付使用的支付方式。

    - `Card`：卡片
  ? |-
    決済種別\
    この決済で利用する決済手段です。

    - `Googlepay`: Google Pay
  : |-
    支付类型。
    本次支付使用的支付方式。

    - `Googlepay`：Google Pay
  ? |-
    決済種別\
    この決済で利用する決済手段です。

    - `Paypay`: PayPay
  : |-
    支付类型。
    本次支付使用的支付方式。

    - `Paypay`：PayPay
  ? |-
    決済種別\
    この決済で利用する決済手段です。

    - `Applepay`: Apple Pay
  : |-
    支付类型。
    本次支付使用的支付方式。

    - `Applepay`：Apple Pay
  ? |-
    決済種別\
    この決済で利用する決済手段です。

    - `Konbini`: コンビニ決済
  : |-
    支付类型。
    本次支付使用的支付方式。

    - `Konbini`：便利店支付
  ? |-
    決済種別\
    この決済で利用する決済手段です。

    - `Virtualaccount`: 銀行振込（バーチャル口座）
  : |-
    支付类型。
    本次支付使用的支付方式。

    - `Virtualaccount`：银行转账（虚拟账户）
  ? |-
    加盟店自由項目 1\
    任意の値を挿入し、決済情報に保存できます。
  : |-
    商户自定义字段 1。
    可写入任意值并保存到支付信息中。
  ? |-
    顧客ID\
    購入者となる顧客のIDです。
  : |-
    客户 ID。
    作为购买者的客户 ID。
  ? |-
    入金可能額設定利用フラグ\
    この決済で使用されるバーチャル口座に対して入金可能額を設定するかどうかを示すフラグです。
    設定した場合、購入者は請求金額以外の金額を振り込むことができなくなります。

    - `true`: 入金可能額を設定する
    - `false`: 入金可能額を設定しない（デフォルト）
  : |-
    可入账金额限制标志。
    表示是否为本次支付使用的虚拟账户设置可入账金额。启用后，购买者只能转入应付金额。

    - `true`：设置可入账金额
    - `false`：不设置可入账金额（默认）
  ? |-
    仮売上有効期限（始値）\
    仮売上有効期限（`auth_max_date`）を対象に範囲検索を行います。この日付以降に仮売上が有効期限切れとなる決済情報を取得します。\
    \
    形式：`yyyy/MM/dd`
  : |-
    预授权有效期（起始值）。
    按预授权有效期（`auth_max_date`）进行范围查询，获取不早于此日期到期的支付信息。

    格式：`yyyy/MM/dd`
  ? |-
    仮売上有効期限（終値）\
    仮売上有効期限（`auth_max_date`）を対象に範囲検索を行います。この日付以前に仮売上が有効期限切れとなる決済情報を取得します。\
    \
    形式：`yyyy/MM/dd`
  : |-
    预授权有效期（结束值）。
    按预授权有效期（`auth_max_date`）进行范围查询，获取不晚于此日期到期的支付信息。

    格式：`yyyy/MM/dd`
  ? |-
    更新日（始値）\
    \
    更新日時（`updated`）を対象に範囲検索を行います。この日付以降に更新された決済情報を取得します。\
    形式：`yyyy/MM/dd`、`yyyy/MM/dd HH:mm:ss`、`yyyy/MM/dd HH:mm:ss.SSS`
  : |-
    更新日期（起始值）。

    按更新时间（`updated`）进行范围查询，获取不早于此日期更新的支付信息。
    格式：`yyyy/MM/dd`、`yyyy/MM/dd HH:mm:ss`、`yyyy/MM/dd HH:mm:ss.SSS`
  ? |-
    更新日（終値）\
    \
    更新日時（`updated`）を対象に範囲検索を行います。この日付以前に更新された決済情報を取得します。\
    形式：`yyyy/MM/dd`、`yyyy/MM/dd HH:mm:ss`、`yyyy/MM/dd HH:mm:ss.SSS`
  : |-
    更新日期（结束值）。

    按更新时间（`updated`）进行范围查询，获取不晚于此日期更新的支付信息。
    格式：`yyyy/MM/dd`、`yyyy/MM/dd HH:mm:ss`、`yyyy/MM/dd HH:mm:ss.SSS`
  ? |-
    取引種別

    - `AUTH`：仮売上
    - `CAPTURE`：即時売上
    - `CANCEL`：キャンセル
  : |-
    交易类型。

    - `AUTH`：预授权
    - `CAPTURE`：即时确认销售额
    - `CANCEL`：取消
  ? |-
    支払期限\
    形式： `yyyy/MM/dd HH:mm:ss.SSS`
  : |-
    付款期限。
    格式：`yyyy/MM/dd HH:mm:ss.SSS`
  ? |-
    支払期限日数\
    \
    `0`～`99`日の範囲でバーチャル口座で振り込み可能な期限日数を指定します。\
    実行日から見て、支払期限日数後の翌日AMに期限切れになります。\
    例）2024/4/1に、`支払期限日数=2`で決済実行した場合、2024/4/4 AMに期限切れ
  : |-
    付款期限天数。

    指定可向虚拟账户转账的期限天数，范围为 `0` 至 `99` 天。
    从执行日算起，在期限天数后的次日上午过期。
    示例：2024/4/1 执行支付且付款期限天数为 `2` 时，于 2024/4/4 上午过期。
  ? |-
    銀行口座情報\
    \
    fincode上での売上入金を受け取るための銀行口座情報
  : |-
    银行账户信息。

    用于接收 fincode 销售款入账的银行账户信息。
  ? |-
    決済ステータス

    - `UNPROCESSED`: 未処理<br /><span class="smallText">請求はまだ実行されていません。</span>
    - `CHECKED`: 有効性チェック済み<br /><span class="smallText">カードの有効性チェックが完了しています。</span>
    - `AUTHORIZED`: 仮売上<br /><span class="smallText">仮売上として与信枠の確保が完了しており、売上確定により請求を完了できます。</span>
    - `CAPTURED`: 売上確定<br /><span class="smallText">請求が完了し、売上が確定しています。</span>
    - `CANCELED`: キャンセル<br /><span class="smallText">この決済はキャンセルされました。</span>
    - `AUTHENTICATED`: 未処理（3Dセキュア認証待ち）<br /><span class="smallText">3Dセキュア認証を使用する決済を実行した直後の状態です。認証後決済実行を行うまで請求や仮売上はされません。</span>
  : |-
    支付状态。

    - `UNPROCESSED`：未处理<br /><span class="smallText">尚未执行收款。</span>
    - `CHECKED`：有效性检查完成<br /><span class="smallText">卡片有效性检查已经完成。</span>
    - `AUTHORIZED`：预授权<br /><span class="smallText">已占用信用额度，可通过确认销售额完成收款。</span>
    - `CAPTURED`：销售额已确认<br /><span class="smallText">收款已完成，销售额已经确认。</span>
    - `CANCELED`：已取消<br /><span class="smallText">本次支付已取消。</span>
    - `AUTHENTICATED`：未处理（等待 3D Secure 认证）<br /><span class="smallText">刚执行需要 3D Secure 认证的支付时处于此状态。在执行认证后支付前不会收款或进行预授权。</span>
  ? |-
    一括決済ID\
    この決済情報が一括決済機能を用いて登録されたものである場合、このフィールドに一括決済IDが設定されます。
  : |-
    批量支付 ID。
    此支付信息通过批量支付功能登记时，本字段中会设置对应的批量支付 ID。
  ? |-
    仮売上有効期限\
    `job_code`に`AUTH（仮売上）`を指定した場合値が設定されます。
  : |-
    预授权有效期。
    `job_code` 指定为 `AUTH`（预授权）时会设置此值。
  ? |-
    入金可能額設定利用フラグ\
    この決済で使用されるバーチャル口座に対して入金可能額を設定するかどうかを指定します。\
    設定した場合、購入者は請求金額以外の金額を振り込むことができなくなります。

    - `true`: 入金可能額を設定する
    - `false`: 入金可能額を設定しない（デフォルト）
  : |-
    可入账金额限制标志。
    指定是否为本次支付使用的虚拟账户设置可入账金额。启用后，购买者只能转入应付金额。

    - `true`：设置可入账金额
    - `false`：不设置可入账金额（默认）
  ? |-
    コンビニ決済 支払期限日数\
    店頭レジでの支払い期限日数です。
  : |-
    便利店支付期限天数。
    表示可在门店收银台付款的期限天数。
  "内税表記有無  \n  \n- `true`: 内税表記  \n- `false`: 外税表記  \n": |-
    是否以含税方式显示。

    - `true`：含税显示
    - `false`：未税显示
  ? |-
    口座種別

    - `0`: 普通
    - `1`: 当座
  : |-
    账户类型。

    - `0`：普通存款账户
    - `1`：往来存款账户
