  /components/schemas/Payment.DirectDebit/properties/status/description: |-
    支付状态。

    - `UNPROCESSED`：未处理<br /><span class="smallText">尚未执行自动扣款。</span>
    - `AWAITING_PAYMENT_APPROVAL`：等待支付处理<br /><span class="smallText">正在等待 fincode 和金融机构处理扣款。</span>
    - `CAPTURED`：销售额已确认<br /><span class="smallText">扣款已完成，销售额已经确认。</span>
    - `CANCELED`：已取消<br /><span class="smallText">本次扣款已取消。</span>
    - `FAILED`：扣款失败<br /><span class="smallText">因某种原因未能完成扣款。</span>
  /components/schemas/Payment.DirectDebit/properties/target_date/description: |-
    扣款指定日期。
    指定计划执行扣款的日期。
    实际扣款会在金融机构营业日执行，因此不一定会在指定日期完成。
    可指定日期与实际扣款日期请参阅 [Docs > 银行账户自动扣款年度日程](https://docs.fincode.jp/payment/directdebit/schedule)中的“扣款指定日期”和“扣款日期”栏。
