    payment_term_to: |-
      支付截止日期范围的结束日期；仅返回截止日期不晚于该日期的支付。
      格式：`yyyy/MM/dd`
    payment_date_from: |-
      支付日期范围的起始日期；仅返回支付日期不早于该日期的支付。
      格式：`yyyy/MM/dd`
    payment_date_to: |-
      支付日期范围的结束日期；仅返回支付日期不晚于该日期的支付。
      格式：`yyyy/MM/dd`
