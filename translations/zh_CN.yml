    在以该租户商户为销售主体的支付中，对 `id` 指定的支付执行 3D Secure 认证后支付。
  /paths/~1v1~1payments~1{id}~1secure/put/parameters/1/description: 订单 ID（支付信息 ID）。
  /paths/~1v1~1secure2~1{access_id}/put/summary: 执行 3D Secure 认证
  /paths/~1v1~1secure2~1{access_id}/put/description: |-
    开始对 `access_id` 指定的卡片支付交易执行 3D Secure 2.0 认证。

    当预先准备的 `tds2_ret_url` 通过 `event` 参数收到 `ThreeDSecureMethodFinished` 或 `ThreeDSecureMethodSkipped` 事件通知时，调用此 API。

    - 当响应中的 `tds2_trans_result` 为 `Y` 或 `A` 时，调用“执行认证后支付”API，完成已经过 3D Secure 认证的支付。
    - 当响应中的 `tds2_trans_result` 为 `C` 时，将购买者重定向至 `challenge_url` 完成挑战认证，然后调用“确认 3D Secure 认证结果”API 确认结果。
    - 当响应中的 `tds2_trans_result` 为上述值以外的值时，表示该支付被 3D Secure 认证拒绝。
  /paths/~1v1~1secure2~1{access_id}/put/parameters/0/description: 交易 ID。
  /paths/~1v1~1secure2~1{access_id}/put/parameters/1/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    对该租户商户的支付信息中由 `access_id` 指定的卡片支付开始执行 3D Secure 认证。
  /paths/~1v1~1secure2~1{access_id}/get/summary: 确认 3D Secure 认证结果
  /paths/~1v1~1secure2~1{access_id}/get/description: |-
    确认 `access_id` 指定的卡片支付交易的 3D Secure 认证结果。

    购买者在 `challenge_url` 页面完成挑战认证后，当预先准备的 `tds2_ret_url` 通过 `event` 参数收到 `AuthResultReady` 事件通知时，调用此 API。

    - 当响应中的 `tds2_trans_result` 为 `Y` 或 `A` 时，调用“执行认证后支付”API，完成已经过 3D Secure 认证的支付。
    - 当响应中的 `tds2_trans_result` 为上述值以外的值时，表示该支付被 3D Secure 认证拒绝。
  /paths/~1v1~1secure2~1{access_id}/get/parameters/0/description: 交易 ID。
  /paths/~1v1~1secure2~1{access_id}/get/parameters/1/description: |-
    本次支付使用的支付类型。未指定时为 `Card`。

    - `Card`：卡片（默认）
    - `Googlepay`：Google Pay
  /paths/~1v1~1secure2~1{access_id}/get/parameters/2/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    对该租户商户的支付信息中由 `access_id` 指定的卡片支付确认 3D Secure 认证结果。
  /components/schemas/ThreeDSecure2Status/description: |-
    3D Secure 2.0 认证处理状态。

    - `AUTHENTICATING`：正在进行 3D Secure 认证
    - `CHALLENGE`：需要执行挑战认证
    - `AUTHENTICATED`：3D Secure 认证处理已完成
  /components/schemas/ThreeDSecure2TransactionResult/description: |-
    3D Secure 2.0 认证处理结果。

    - `Y`：认证成功
    - `A`：认证尝试获准<br><span class="smallText">虽未实际执行认证或确认，但已提供尝试认证或确认的证明。</span>
    - `C`：需要追加挑战认证<br><span class="smallText">购买者需要在 `challenge_url` 页面完成追加认证。</span>
    - `N`：交易被拒绝，或未认证／未确认账户
    - `R`：认证或账户确认被拒绝<br><span class="smallText">发卡机构拒绝认证，并要求不要尝试授权。</span>
    - `U`：认证或账户确认执行失败，或发生技术问题
  /components/schemas/ThreeDSecure2TransactionResultReason/description: |-
    3D Secure 认证结果原因码。

    表示 3D Secure 2.0 认证结果（`tds2_trans_result`）原因的代码。

    - `01`：卡片认证失败
    - `02`：未知设备
    - `03`：不支持的设备
    - `04`：超过认证频率上限
    - `05`：卡片已过期
    - `06`：卡号无效
    - `07`：交易无效
    - `08`：不存在卡片记录
    - `09`：安全故障
    - `10`：被盗卡片
    - `11`：疑似欺诈
    - `12`：持卡人无权执行该交易
    - `13`：持卡人未注册该服务
    - `14`：交易在 3D Secure 处理服务中超时
    - `15`：可信度低
    - `16`：可信度中等
    - `17`：可信度高
    - `18`：可信度非常高
    - `19`：超过 3D Secure 处理服务允许的最大挑战次数
    - `20`：不支持非支付交易
    - `21`：不支持 3RI 交易
    - `22`：3D Secure 处理服务发生技术问题
    - `23`：3D Secure 处理服务判定需要解耦认证，但 3D Secure 请求方未提出该要求
    - `24`：超过 3D Secure Requestor Decoupled Max Time
    - `25`：未提供足够时间完成解耦认证中的持卡人认证
    - `26`：已尝试认证，但持卡人未执行认证
  /components/schemas/Payment.Card.ExecutingAfterThreeDSecure.Request/properties/pay_type/description: |-
