  /components/schemas/DirectDebitSettlementRoute/description: |-
    自动扣款服务。

    - `1`：自动扣款（每月 5、6、23、27 日）
    - `2`：自动扣款（每月 1、5、20、26 日）
  /components/schemas/DirectDebitLastResultCode/description: |-
    最近一次扣款结果码。
    表示使用此支付方式执行的最近一次自动扣款结果。

    - `0`：扣款成功
    - `1`：因余额不足而失败
    - `2`：因无存款账户交易而失败<br /><span class="smallText">例如向不存在的账户发起扣款时会出现此结果。</span>
    - `3`：因购买者原因而失败
    - `4`：因扣款申请书未送达或内容有误而失败<br /><span class="smallText">金融机构尚未登记银行账户自动扣款申请书时会出现此结果。</span>
    - `7`：因数据错误而失败<br /><span class="smallText">仅适用于每月 1、5、20、26 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `8`：因商户原因而失败<br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `9`：其他失败<br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `E`：因数据错误而失败<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `N`：未收到扣款结果<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>

    [联系 fincode](https://form.fincode.jp/contact)
