  ? |-
    最新取引日時\
    このバーチャル口座で発生した取引のうち、最も新しい日時です。\
    形式：`yyyy/MM/dd`
  : |-
    最近交易日期。
    该虚拟账户发生的最近一笔交易日期。
    格式：`yyyy/MM/dd`
  ? |-
    支払期限日数\
    \
    実行日から見て、支払期限日数後の翌日AMに期限切れになります。\
    例）2024/4/1に、`支払期限日数=2`で決済実行した場合、2024/4/4 AMに期限切れ
  : |-
    付款期限天数。

    从执行日算起，在期限天数后的次日上午过期。
    示例：2024/4/1 执行支付且付款期限天数为 `2` 时，于 2024/4/4 上午过期。
  ? |-
    バーチャル口座 再利用 オーダーID\
    \
    あるオーダーIDのバーチャル口座を再利用する場合、その決済のオーダーIDを参照先として指定します。\
    バーチャル口座の再利用が可能な決済の条件は以下の通りです。

    1. 参照する決済の`status`が`CAPTURED`、`CANCELED`、`EXPIRED`であること
    2. 参照する決済に紐づくバーチャル口座への振込から90日以内であること
  : |-
    虚拟账户复用参考订单 ID。

    复用其他订单的虚拟账户时，指定该支付的订单 ID 作为参考。可复用的支付必须同时满足：

    1. 参考支付的 `status` 为 `CAPTURED`、`CANCELED` 或 `EXPIRED`
    2. 距离向该支付所关联虚拟账户的最近一次转账不超过 90 天
  ? |-
