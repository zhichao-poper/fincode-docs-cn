      - `0`: メールを送信しない（デフォルト）
      - `1`: メールを送信する
    : |-
      差额付款通知邮件发送标志。

      - `0`：不发送邮件（默认）
      - `1`：发送邮件
    ? |-
      請求番号
      指定しないまま請求書を開始した場合、自動採番されます。
    : |-
      账单编号。启动账单而未指定编号时，系统将自动编号。
    ? |-
      上書き顧客（請求先）情報\
      `customer_id`で指定した顧客の情報のうち、上書きを行う場合に指定します。\
      顧客情報の上書きはこのインボイス情報においてのみ適用されます。
    : |-
      覆盖后的客户（账单接收方）信息。
      如需覆盖 `customer_id` 所指定客户的部分信息，请填写本字段。覆盖内容仅对当前账单生效，不会修改客户主数据。
    ? |-
      発行元事業者情報
      指定しなかった場合、本番環境申請の際にご提出いただいた情報を利用します。
    : |-
      开票方企业信息。未填写时，使用申请生产环境时提交的信息。
    ? |-
      ショップで利用可能な決済種別のリスト
      利用可能にする決済種別全てを指定してください。

      - `Virtualaccount`: 銀行振込（バーチャル口座）決済
      - `Card`: カード決済
      - `Directdebit`: 口座振替決済
    : |-
      商户可使用的支付类型列表。请填写需要启用的全部支付类型。

      - `Virtualaccount`：银行转账（虚拟账户）
      - `Card`：银行卡支付
      - `Directdebit`：银行账户自动扣款
    ? |-
      処理区分
      以下のいずれかを指定してください。

      - `AUTH`: 仮売上
      - `CAPTURE`: 即時売上
    : |-
      银行卡支付的处理类型，请指定以下任一值。

      - `AUTH`：仅授权
      - `CAPTURE`：立即请款
    ? |-
      バーチャル口座 再利用 インボイスID\
      \
      あるインボイス情報が持つバーチャル口座を再利用する場合、そのインボイス情報のIDを参照先として指定します。\
      バーチャル口座の再利用が可能なインボイスの条件は以下の通りです。

       - 参照するインボイスのステータスが `PAID` であること
       - 参照するインボイスのステータスが `PAID` に遷移してから90日以内であること
    : |-
      用于复用虚拟账户的账单 ID。

      如需复用另一账单持有的虚拟账户，请填写该账单 ID。被引用的账单必须处于 `PAID` 状态，且转为 `PAID` 后未超过 90 天。
    ? |-
      インボイス請求書のステータス

      - `DRAFT`: 下書き
      - `AWAITING_CUSTOMER_PAYMENT`: 支払い待ち
      - `PAID`: 支払い完了
      - `CANCELED`: キャンセル済
    : |-
      账单状态。

      - `DRAFT`：草稿
      - `AWAITING_CUSTOMER_PAYMENT`：等待客户支付
      - `PAID`：已支付
      - `CANCELED`：已取消
    ? |-
      [非推奨] インボイス請求書PDFダウンロードURL\
      ※ 2024年10月現在、請求書を表示するWebページのURLがレスポンスされます。このページへはインボイス 請求ページからアクセスできます。
    : |-
      [已弃用] 账单 PDF 下载 URL。
      截至 2024 年 10 月，响应实际返回账单展示网页的 URL；也可从账单支付页面访问该网页。
    ? |-
      [非推奨] インボイス領収書PDFダウンロードURL\
      ※ 2024年10月現在、領収書を表示するWebページのURLがレスポンスされます。このページへは支払い完了後にインボイス 請求ページからアクセスできます。
    : |-
      [已弃用] 账单收据 PDF 下载 URL。
      截至 2024 年 10 月，响应实际返回收据展示网页的 URL；支付完成后也可从账单支付页面访问该网页。
    ? |-
      利用可能な決済種別リスト

      - `"Virtualaccount"`: 銀行振込（バーチャル口座）決済
      - `"Card"`: カード決済
      - `"Directdebit"`: 口座振替決済
    : |-
      可用支付类型列表。

      - `"Virtualaccount"`：银行转账（虚拟账户）
      - `"Card"`：银行卡支付
      - `"Directdebit"`：银行账户自动扣款
    ? |-
      取引金額の入力方式
      - null：単価入力時(デフォルト)
      - `amount`：金額(税込)入力時
    : |-
      交易金额的填写方式。
      - `null`：按单价填写（默认）
      - `amount`：按含税金额填写
    ? |-
      このインボイス情報に対して発行されたバーチャル口座情報\
      このバーチャル口座に対して振込を行うことでインボイスによる請求に対して支払いできます。
    : |-
      为当前账单签发的虚拟账户信息。向该虚拟账户转账即可支付当前账单。
    ? |-
      振替指定日
      形式：`YYYY/MM/DD`
    : |-
      指定扣款日期。
      格式：`YYYY/MM/DD`
    ? |-
      振替サービス
      - `1`: 口座振替（5・6・23・27日）
      - `2`: 口座振替（1・5・20・26日）
    : |-
      自动扣款服务类型。
      - `1`：自动扣款（每月 5、6、23、27 日）
      - `2`：自动扣款（每月 1、5、20、26 日）
    ? |-
      口座振替失敗メール送信フラグ

      口座振替失敗時に請求元に対し通知メールを送るか決定するフラグ

      - `0`：メールを送信しない（デフォルト）
      - `1`：メールを送信する
    : |-
      自动扣款失败邮件发送标志。用于决定扣款失败时是否向账单发起方发送通知邮件。

      - `0`：不发送邮件（默认）
      - `1`：发送邮件
    "このインボイス情報に対する口座振替の口座情報 この口座から引き落とし完了することでインボイスによる請求に対して支払いできます。": 当前账单的自动扣款账户信息。从该账户成功扣款后，即视为当前账单已支付。

property_descriptions:
  order_description: 支付时在购买者 PayPay 应用中显示的订单说明。
  remarks: |-
    账单明细显示内容。可使用半角或全角英数字、片假名、空格及部分符号。
    可用符号：`.`、`(`、`)`、`–`、`．`、`（`、`）`、`ー`
    默认值：商户名称片假名的前 9 个字符。
  td_tenant_name: 3D Secure 认证页面上显示的商户名称。
  tds_type: |-
    是否使用 3D Secure 进行支付。

    - `0`：不使用（默认）
    - `2`：使用 3D Secure 2.0
  tds2_type: |-
    发卡机构不支持 3D Secure 2.0 时的后续处理方式。

    - `1`：执行 3D Secure 1.0 认证
    - `2`：按错误结束处理（默认）
    - `3`：不执行 3D Secure 认证，直接进行常规授权
  tds2_three_ds_req_auth_method: |-
    客户用户账户的登录方式。填写时，还必须同时填写登录认证记录和登录时间。

    - `01`：无认证（以访客身份登录）
    - `02`：使用商户自身的认证信息
    - `03`：SSO（单点登录）
    - `04`：使用发卡机构的认证信息
    - `05`：第三方认证
    - `06`：FIDO 认证
  tds2_tenant_name: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    3D Secure 认证页面上显示的商户名称。
  tds2_ch_acc_change: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    购买者用户账户的最后更新日期。
    格式：`YYYYMMDD`

    请填写商户应用中该用户账户信息最后一次更新的日期。
  tds2_ch_acc_date: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    购买者用户账户的创建日期。
    格式：`YYYYMMDD`
  tds2_ch_acc_pw_change: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    购买者用户账户的密码最后更新日期。
    格式：`YYYYMMDD`
  tds2_nb_purchase_account: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    购买者过去 6 个月内的购买次数。
  tds2_payment_acc_age: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户用户账户中的银行卡登记日期。
    格式：`YYYYMMDD`
  tds2_provision_attempts_day: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户用户账户在过去 24 小时内尝试添加银行卡的次数。
  tds2_ship_address_usage: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    该收货地址首次使用的日期。
    格式：`YYYYMMDD`
  tds2_ship_name_ind: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    购买者姓名与收货人姓名是否一致。

    - `01`：客户姓名与收货人姓名一致
    - `02`：客户姓名与收货人姓名不一致
  tds2_suspicious_acc_activity: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    账户可疑活动信息。用于表示商户是否发现该持卡客户存在可疑行为，包括历史欺诈行为。

    - `01`：未发现可疑行为
    - `02`：发现可疑行为
  tds2_txn_activity_day: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    购买者过去 24 小时内的交易次数。
  tds2_txn_activity_year: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    购买者过去一年内的交易次数。
  tds2_three_ds_req_auth_data: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    用户登录认证记录。填写时，还必须同时填写登录方式和登录时间。

    - `01`：无认证（以访客身份登录）
    - `02`：使用商户自身的认证信息
    - `03`：SSO（单点登录）
    - `04`：使用发卡机构的认证信息
    - `05`：第三方认证
    - `06`：FIDO 认证
  tds2_three_ds_req_auth_timestamp: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户用户账户的登录时间。
    格式：`YYYYMMDDHHmm`

    填写用户登录认证记录时，还必须同时填写登录方式和登录时间。
  tds2_addr_match: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    持卡客户的账单地址与收货地址是否一致。

    - `Y`：一致
    - `N`：不一致
  tds2_bill_addr_country: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户账单地址的国家/地区代码。
    格式：ISO 3166-1 numeric

    未填写时，自动使用客户的 `addr_country`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。
  tds2_bill_addr_state: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户账单地址的州或都道府县代码。
    参考：[日本国土交通省都道府县代码](https://nlftp.mlit.go.jp/ksj/gml/codelist/PrefCd.html)

    未填写时，自动使用客户的 `addr_state`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。
  tds2_bill_addr_city: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户账单地址的城市名称。

    未填写时，自动使用客户的 `addr_city`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。
  tds2_bill_addr_line_1: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户账单地址的第 1 行，请填写街道、门牌号或区块信息，也可以包含都道府县及市区信息。

    如果现有地址无法按字段拆分，请在长度限制内分配到 `tds2_bill_addr_line_1`～`tds2_bill_addr_line_3`；也可以将完整地址全部填写在本字段，并将第 2、3 行留空。

    未填写时，自动使用客户的 `addr_line_1`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。
  tds2_bill_addr_line_2: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户账单地址的第 2 行，请填写建筑物名称、房间号等信息。

    未填写时，自动使用客户的 `addr_line_2`。
  tds2_bill_addr_line_3: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户账单地址的第 3 行，请填写其他地址信息。

    未填写时，自动使用客户的 `addr_line_3`。
  tds2_bill_addr_post_code: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户账单地址的邮政编码。

    未填写时，自动使用客户的 `addr_post_code`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。
  tds2_email: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户的电子邮箱地址。未填写时，自动使用客户的 `email`。

    自 2024 年 8 月 12 日起，以下字段必须至少填写一项：

    - 客户家庭电话号码（`tds2_home_phone_no`）
    - 客户手机号码（`tds2_mobile_phone_no`）
    - 客户工作单位电话号码（`tds2_work_phone_no`）
    - 客户电子邮箱地址（`tds2_email`）

    目前即使未传递这些信息仍会执行认证，但未来可能不再支持。
  tds2_home_phone_cc: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户家庭电话号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_home_phone_no`。

    未填写时，自动使用客户的 `phone_cc`。
  tds2_home_phone_no: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户家庭电话号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_home_phone_cc`。

    未填写时，自动使用客户的 `phone_no`。自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email` 必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。
  tds2_mobile_phone_cc: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户手机号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_mobile_phone_no`。
  tds2_mobile_phone_no: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户手机号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_mobile_phone_cc`。

    自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email` 必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。
  tds2_work_phone_cc: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户工作单位电话号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_work_phone_no`。
  tds2_work_phone_no: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户工作单位电话号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_work_phone_cc`。

    自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email` 必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。
  tds2_ship_addr_city: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户收货地址的城市名称。
  tds2_ship_addr_country: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户收货地址的国家/地区代码。
    格式：ISO 3166-1 numeric
  tds2_ship_addr_line_1: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户收货地址的第 1 行。
  tds2_ship_addr_line_2: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户收货地址的第 2 行。
  tds2_ship_addr_line_3: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户收货地址的第 3 行。
  tds2_ship_addr_post_code: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户收货地址的邮政编码。
  tds2_ship_addr_state: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    客户收货地址的州或都道府县代码。
    参考：[日本国土交通省都道府县代码](https://nlftp.mlit.go.jp/ksj/gml/codelist/PrefCd.html)
  tds2_delivery_email_address: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    商品交付联系邮箱。
  tds2_delivery_timeframe: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    商品交付时间范围。

    - `01`：电子交付
    - `02`：当日发货
    - `03`：次日发货
    - `04`：第 2 天及以后发货
  tds2_gift_card_amount: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅限购买预付卡或礼品卡时使用。填写预付卡或礼品卡的购买总金额。
  tds2_gift_card_count: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅限购买预付卡或礼品卡时使用。填写已购买的预付卡或礼品卡总数量。
  tds2_gift_card_curr: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅限购买预付卡或礼品卡时使用。填写预付卡或礼品卡的货币代码。
    格式：ISO 4217 numeric

    不可使用以下货币代码（债券市场单位等）：`955`、`956`、`957`、`958`、`959`、`960`、`961`、`962`、`963`、`964`、`999`。
  tds2_pre_order_date: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    商品预计发售日期。
    格式：`YYYYMMDD`
  tds2_pre_order_purchase_ind: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    商品销售状态。

    - `01`：已发售商品
    - `02`：预售商品
  tds2_reorder_items_ind: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    表示本次商品订单是首次购买还是重复购买。

    - `01`：首次购买
    - `02`：重复购买
  tds2_ship_ind: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    交易商品的配送方式。

    - `01`：配送至持卡客户的账单地址
    - `02`：配送至商户保存的其他已验证地址
    - `03`：配送至与持卡客户账单地址不同的地址
    - `04`：配送至门店或到附近门店自提（门店地址通过收货地址指定）
    - `05`：数字商品（包括在线服务、电子礼品卡及兑换码）
    - `06`：无需配送（旅行及活动门票）
    - `07`：其他（游戏、无需配送的数字服务、电子媒体订阅费等）
  tds2_recurring_expiry: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅限订阅等持续扣款业务使用。填写持续扣款的结束日期。
    格式：`YYYYMMDD`
  tds2_recurring_frequency: |-
    <span class="smallText color--blue-400">[3D Secure 认证参数]</span>
    仅限订阅等持续扣款业务使用。填写持续扣款的最短扣款间隔天数。

schema_property_descriptions:
  ContractInfo.V2:
    representative_last_name: |-
      法定代表人姓氏。
      可用字符：汉字、平假名、片假名、半角英文字母。
    representative_last_name_kana: |-
      法定代表人姓氏（片假名）。
      格式：全角片假名。
    representative_first_name: |-
      法定代表人名字。
      可用字符：汉字、平假名、片假名、半角英文字母。
    representative_first_name_kana: |-
      法定代表人名字（片假名）。
      格式：全角片假名。
    representative_postal_code: |-
      法定代表人地址的邮政编码。
      格式：`xxx-xxxx`
    representative_prefecture: |-
      法定代表人地址的都道府县。
      格式：汉字。
    representative_prefecture_kana: |-
      法定代表人地址的都道府县（片假名）。
      格式：全角片假名。
    representative_address_municipality: |-
      法定代表人地址的市区町村。
      可用字符：汉字、平假名、片假名、半角英数字。
    representative_address_municipality_kana: |-
      法定代表人地址的市区町村（片假名）。
      格式：全角片假名。
    representative_address_section: |-
      法定代表人地址的町域。
      可用字符：汉字、平假名、片假名、半角英数字。
    representative_address_section_kana: |-
      法定代表人地址的町域（片假名）。
      格式：全角片假名。
    representative_address_chrome: |-
      法定代表人地址的门牌号。
      可用字符：汉字、平假名、片假名、半角英数字。
    representative_address_chrome_kana: 法定代表人地址的门牌号（片假名）。
    representative_address_building_name: |-
      法定代表人地址的建筑物名称。
      可用字符：汉字、平假名、片假名、半角英数字。
    representative_address_building_name_kana: |-
      法定代表人地址的建筑物名称（片假名）。
      格式：全角片假名。
    representative_tel: |-
      法定代表人电话号码。
      格式：不含连字符的半角数字；不可使用 PHS 号码。
    representative_birthday: |-
      法定代表人出生日期。
      格式：`yyyy/MM/dd`
    representative_gender: |-
      法定代表人性别。

      - `0`：男性
      - `1`：女性
    staff1_last_name: |-
      第一联系人姓氏。
      可用字符：汉字、平假名、片假名、半角英文字母。

      fincode 会向第一、第二联系人发送审核结果通知及审核暂缓事项的处理通知。
    staff1_last_name_kana: |-
      第一联系人姓氏（片假名）。
      格式：全角片假名。
    staff1_first_name: |-
      第一联系人名字。
      可用字符：汉字、平假名、片假名、半角英文字母。
    staff1_first_name_kana: |-
      第一联系人名字（片假名）。
      格式：全角片假名。
    staff1_company_name: |-
      第一联系人公司名称。
      可用字符：汉字、平假名、片假名、半角英数字。
    staff1_belongs: |-
      第一联系人所属部门。
      可用字符：汉字、平假名、片假名、半角英数字。
    staff1_tel: |-
      第一联系人电话号码。
      格式：不含连字符的半角数字；不可使用 PHS 号码。
    staff1_mail: |-
      第一联系人电子邮箱地址。
      格式：RFC 5322。
    staff2_last_name: |-
      第二联系人姓氏。
      可用字符：汉字、平假名、片假名、半角英文字母。
    staff2_last_name_kana: |-
      第二联系人姓氏（片假名）。
      格式：全角片假名。
    staff2_first_name: |-
      第二联系人名字。
      可用字符：汉字、平假名、片假名、半角英文字母。
    staff2_first_name_kana: |-
      第二联系人名字（片假名）。
      格式：全角片假名。
    staff2_company_name: |-
      第二联系人公司名称。
      可用字符：汉字、平假名、片假名、半角英数字。
    staff2_belongs: |-
      第二联系人所属部门。
      可用字符：汉字、平假名、片假名、半角英数字。
    staff2_tel: |-
      第二联系人电话号码。
      格式：不含连字符的半角数字；不可使用 PHS 号码。
    staff2_mail: |-
