  Payment.ListRetrieving.Konbini.QueryParams:
    status: |-
      便利店支付状态，可使用半角逗号分隔指定多个值（OR 查询）。

      - `UNPROCESSED`：未处理
      - `AWAITING_CUSTOMER_PAYMENT`：等待购买者付款
      - `CAPTURED`：已确认销售
      - `CANCELED`：已取消
      - `EXPIRED`：已过期
    payment_term_from: |-
