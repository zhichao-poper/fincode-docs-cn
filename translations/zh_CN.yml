  /components/schemas/ThreeDSecure.Authorizing.Response/allOf/0/properties/pay_type/description: |-
    支付类型。
    本次支付使用的支付方式。未指定时为 `Card`。

    - `Card`：卡片（默认）
    - `Googlepay`：Google Pay
  /components/schemas/ThreeDSecure.Authorizing.Response/allOf/0/properties/challenge_url/description: |-
    3D Secure 2.0 认证挑战 URL。

    购买者访问 `acs_url` 后，如发卡机构判定需要追加挑战认证，则在此参数中返回对应 URL。
  /components/schemas/DirectDebitApplicationType/description: |-
    登记此自动扣款账户时使用的申请方式。

    - `PAPER`：通过扣款申请书登记
    - `ONLINE`：通过 Web 在线登记
  /components/schemas/DirectDebitSettlementRoute/description: |-
    自动扣款服务。

    - `1`：自动扣款（每月 5、6、23、27 日）
    - `2`：自动扣款（每月 1、5、20、26 日）
  /components/schemas/DirectDebitLastResultCode/description: |-
    最近一次扣款结果码。
    表示使用此支付方式执行的最近一次自动扣款结果。

    - `0`：扣款成功
    - `1`：因余额不足而失败
    - `2`：因无存款账户交易而失败<br /><span class="smallText">例如向不存在的账户发起扣款时会出现此结果。</span>
    - `3`：因购买者原因而失败
    - `4`：因扣款申请书未送达或内容有误而失败<br /><span class="smallText">金融机构尚未登记银行账户自动扣款申请书时会出现此结果。</span>
    - `7`：因数据错误而失败<br /><span class="smallText">仅适用于每月 1、5、20、26 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `8`：因商户原因而失败<br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `9`：其他失败<br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `E`：因数据错误而失败<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `N`：未收到扣款结果<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>

    [联系 fincode](https://form.fincode.jp/contact)
  /components/schemas/DirectDebitResultCode/description: |-
    扣款结果码。

    - `0`：扣款成功
    - `1`：因余额不足而失败
    - `2`：因无存款账户交易而失败<br /><span class="smallText">例如向不存在的账户发起扣款时会出现此结果。</span>
    - `3`：因购买者原因而失败
    - `4`：因扣款申请书未送达或内容有误而失败<br /><span class="smallText">金融机构尚未登记银行账户自动扣款申请书时会出现此结果。</span>
    - `7`：因数据错误而失败<br /><span class="smallText">仅适用于每月 1、5、20、26 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `8`：因商户原因而失败<br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `9`：其他失败<br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `E`：因数据错误而失败<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>
    - `N`：未收到扣款结果<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>

    [联系 fincode](https://form.fincode.jp/contact)
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/target_date_from/description: |-
    扣款指定日期（起始值）。
    按扣款指定日期（`target_date`）进行范围查询，获取扣款指定日期不早于此日期的支付信息。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/target_date_to/description: |-
    扣款指定日期（结束值）。
    按扣款指定日期（`target_date`）进行范围查询，获取扣款指定日期不晚于此日期的支付信息。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/withdrawal_date_from/description: |-
    实际扣款日期（起始值）。
    按实际扣款日期（`withdrawal_date`）进行范围查询，获取不早于此日期完成扣款的支付信息。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/withdrawal_date_to/description: |-
    实际扣款日期（结束值）。
    按实际扣款日期（`withdrawal_date`）进行范围查询，获取不晚于此日期完成扣款的支付信息。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/result_code/description: |-
    扣款结果码。
    获取符合指定扣款结果的支付信息。使用逗号分隔可指定多个值（OR 查询）。

    - `0`：扣款成功
    - `1`：余额不足（失败）
    - `2`：无存款账户交易（失败）
    - `3`：购买者原因（失败）
    - `4`：扣款申请书未送达或内容有误（失败）
    - `7`：数据错误（失败）<br /><span class="smallText">仅适用于每月 1、5、20、26 日扣款的服务。</span>
    - `8`：商户原因（失败）
    - `9`：其他原因（失败）
    - `E`：数据错误（失败）<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span>
    - `N`：未收到扣款结果（失败）<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span>
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/pay_pattern/description: |-
    收费类型。
    获取符合指定收费类型的支付信息。使用逗号分隔可指定多个值（OR 查询）。

    - `onetime`：非订阅的一次性支付
    - `subscription`：订阅支付
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/subscription_id/description: |-
    订阅 ID。
    指定订阅 ID 后，获取由该订阅创建的支付信息。
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/updated_from/description: |-
    更新日期（起始值）。

    按更新时间（`updated`）进行范围查询，获取不早于此日期更新的支付信息。
    格式：`yyyy/MM/dd`、`yyyy/MM/dd HH:mm:ss`、`yyyy/MM/dd HH:mm:ss.SSS`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/updated_to/description: |-
    更新日期（结束值）。

    按更新时间（`updated`）进行范围查询，获取不晚于此日期更新的支付信息。
    格式：`yyyy/MM/dd`、`yyyy/MM/dd HH:mm:ss`、`yyyy/MM/dd HH:mm:ss.SSS`
  /components/schemas/Payment.ListRetrieving.DirectDebit.QueryParams/properties/sort/description: |-
    指定排序字段与顺序。
    示例：`?sort=updated␣desc,created␣asc`

    可排序字段：

    - `status`：状态
    - `process_date`：处理时间
    - `total_amount`：合计金额
    - `target_date`：扣款指定日期
    - `withdrawal_date`：实际扣款日期
    - `created`：创建时间
    - `updated`：更新时间
  /components/schemas/Payment.DirectDebit/properties/pay_type/description: |-
    支付类型。
    本次支付使用的支付方式。

    - `Directdebit`：银行账户自动扣款
  /components/schemas/Payment.DirectDebit/properties/status/description: |-
    支付状态。

    - `UNPROCESSED`：未处理<br /><span class="smallText">尚未执行自动扣款。</span>
    - `AWAITING_PAYMENT_APPROVAL`：等待支付处理<br /><span class="smallText">正在等待 fincode 和金融机构处理扣款。</span>
    - `CAPTURED`：销售额已确认<br /><span class="smallText">扣款已完成，销售额已经确认。</span>
    - `CANCELED`：已取消<br /><span class="smallText">本次扣款已取消。</span>
    - `FAILED`：扣款失败<br /><span class="smallText">因某种原因未能完成扣款。</span>
  /components/schemas/Payment.DirectDebit/properties/target_date/description: |-
    扣款指定日期。
    指定计划执行扣款的日期。
    实际扣款会在金融机构营业日执行，因此不一定会在指定日期完成。
    可指定日期与实际扣款日期请参阅 [Docs > 银行账户自动扣款年度日程](https://docs.fincode.jp/payment/directdebit/schedule)中的“扣款指定日期”和“扣款日期”栏。
  /components/schemas/Payment.DirectDebit/properties/withdrawal_date/description: |-
    实际扣款日期。
    实际从购买者账户完成扣款的日期。

    格式：`yyyy/MM/dd`
  /components/schemas/Payment.DirectDebit/properties/request_accept_end_date/description: |-
    扣款请求受理截止日期。
    接受扣款请求的最后日期；可在该日 23:59 前提交扣款请求（执行支付）。

    格式：`yyyy/MM/dd`
    详情请参阅 [Docs > 银行账户自动扣款年度日程](https://docs.fincode.jp/payment/directdebit/schedule)中的“扣款请求受理截止日期”栏。
  /components/schemas/Payment.DirectDebit/properties/transfer_return_date/description: |-
    预计扣款结果反映日期。

    格式：`yyyy/MM/dd`
    详情请参阅 [Docs > 银行账户自动扣款年度日程](https://docs.fincode.jp/payment/directdebit/schedule)中的“扣款结果返回日期”栏。
  /components/schemas/Payment.DirectDebit/properties/payment_method_id/description: |-
    支付方式 ID。
    本次支付使用的支付方式 ID。
  /components/schemas/Payment.DirectDebit/properties/bank_code/description: |-
    金融机构代码。
    fincode 银行账户自动扣款支持的金融机构代码列表，请参阅 [Docs > 可用金融机构（银行账户自动扣款）](https://docs.fincode.jp/payment/directdebit/restriction)。
  /components/schemas/Payment.DirectDebit/properties/bank_name/description: 金融机构名称。
  /components/schemas/Payment.DirectDebit/properties/branch_code/description: 分行代码。
  /components/schemas/Payment.DirectDebit/properties/branch_name/description: 分行名称。
  /components/schemas/Payment.DirectDebit/properties/remarks/description: |-
    账单明细显示内容。

    - 格式：半角英数字及片假名／全角英数字及片假名／部分符号／半角或全角空格
    - 默认值：`商户名称片假名的前 9 个字符`

    可用符号：

    - 半角：`.`、`(`、`)`、`–`
    - 全角：`．`、`（`、`）`、`ー`
  /components/schemas/Payment.DirectDebit/properties/subscription_id/description: |-
    订阅 ID。
    此支付信息由订阅生成时，本字段中会设置对应的订阅 ID。
  /components/schemas/Payment.DirectDebit.Creating.Request/properties/pay_type/description: |-
    支付类型。
    本次支付使用的支付方式。

    - `Directdebit`：银行账户自动扣款
  /components/schemas/Payment.DirectDebit.Creating.Request/properties/amount/description: |-
    使用金额。
    与 `tax` 的合计值必须处于该支付方式规定的支付金额范围内。
    参阅：[银行账户自动扣款 > 限制事项 > 可用金额](https://docs.fincode.jp/payment/directdebit/restriction)
  /components/schemas/Payment.DirectDebit.Creating.Request/properties/tax/description: |-
    税费及运费。
    与 `amount` 的合计值必须处于该支付方式规定的支付金额范围内。
    参阅：[银行账户自动扣款 > 限制事项 > 可用金额](https://docs.fincode.jp/payment/directdebit/restriction)
  /components/schemas/Payment.DirectDebit.Creating.Request/properties/client_field_1/description: |-
    商户自定义字段 1。
    可写入任意值并保存到支付信息中。
  /components/schemas/Payment.DirectDebit.Creating.Request/properties/client_field_2/description: 商户自定义字段 2。
  /components/schemas/Payment.DirectDebit.Creating.Request/properties/client_field_3/description: 商户自定义字段 3。
  /components/schemas/Payment.DirectDebit.Executing.Request/properties/pay_type/description: |-
    支付类型。
    本次支付使用的支付方式。

    - `Directdebit`：银行账户自动扣款
  /components/schemas/Payment.DirectDebit.Executing.Request/properties/customer_id/description: |-
    客户 ID。
    作为购买者的客户 ID。
  /components/schemas/Payment.DirectDebit.Executing.Request/properties/payment_method_id/description: |-
    支付方式 ID。
    本次支付使用的支付方式（自动扣款账户）ID。未指定时使用默认支付方式。
  /components/schemas/Payment.DirectDebit.Canceling.Request/properties/pay_type/description: |-
    支付类型。
    本次支付使用的支付方式。

    - `Directdebit`：银行账户自动扣款
  /components/schemas/Payment.DirectDebit.ChangingAmount.Request/properties/pay_type/description: |-
    支付类型。
    本次支付使用的支付方式。

    - `Directdebit`：银行账户自动扣款
  /components/schemas/Payment.DirectDebit.ChangingAmount.Request/properties/amount/description: |-
    使用金额。
    与 `tax` 的合计值必须处于该支付方式规定的支付金额范围内。
    参阅：[银行账户自动扣款 > 限制事项 > 可用金额](https://docs.fincode.jp/payment/directdebit/restriction)
  /components/schemas/Payment.DirectDebit.ChangingAmount.Request/properties/tax/description: |-
    税费及运费。
    与 `amount` 的合计值必须处于该支付方式规定的支付金额范围内。
    参阅：[银行账户自动扣款 > 限制事项 > 可用金额](https://docs.fincode.jp/payment/directdebit/restriction)
  /paths/~1v1~1payments/get/summary: 支付列表查询
  /paths/~1v1~1payments/get/description: 获取支付信息列表。
  /paths/~1v1~1payments/get/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    获取与该租户商户关联的支付信息列表。
  /paths/~1v1~1payments/get/parameters/1/description: 查询支付列表时使用的查询条件参数。
  /paths/~1v1~1payments/post/summary: 登记支付
  /paths/~1v1~1payments/post/description: 向 fincode 登记支付信息。登记成功时尚未向客户收款。
  /paths/~1v1~1payments/post/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    以指定租户商户为销售主体登记支付。该租户必须已经通过 `pay_type` 所指定支付方式的签约审核。
  /paths/~1v1~1payments~1{id}/put/summary: 执行支付
  /paths/~1v1~1payments~1{id}/put/description: 对已登记到 fincode 的指定支付信息执行收款。
  /paths/~1v1~1payments~1{id}/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，对 `id` 指定的支付执行支付处理。
  /paths/~1v1~1payments~1{id}/get/summary: 获取支付
  /paths/~1v1~1payments~1{id}/get/description: 获取指定的支付信息。
  /paths/~1v1~1payments~1{id}/get/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，获取 `id` 指定的支付信息。
  /paths/~1v1~1payments~1{id}/get/parameters/2/description: 获取支付信息时使用的查询条件参数。
  /paths/~1v1~1payments~1{id}~1capture/put/summary: 确认销售额
  /paths/~1v1~1payments~1{id}~1capture/put/description: |-
    对 `status` 为预授权（`AUTHORIZED`）或已取消（`CANCELED`）的支付确认销售额。
    成功后，状态将变为 `CAPTURED`，并计入以该时点为统计基准的销售款入账。
  /paths/~1v1~1payments~1{id}~1capture/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，对 `id` 指定的支付确认销售额。
  /paths/~1v1~1payments~1{id}~1cancel/put/summary: 取消支付
  /paths/~1v1~1payments~1{id}~1cancel/put/description: |-
    取消支付。取消成功后，`status` 将变为已取消（`CANCELED`）。

    向用户退款的处理方式等会因支付方式而异。
    详情请参阅 [Docs > 支付](/payment)。
  /paths/~1v1~1payments~1{id}~1cancel/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，取消 `id` 指定的支付。
  /paths/~1v1~1payments~1{id}~1auth/put/summary: 重新授权支付
  /paths/~1v1~1payments~1{id}~1auth/put/description: |-
    重新执行支付授权。

    此操作可用于 `pay_type` 为 `Card` 且 `status` 为 `CANCELED` 的支付（已取消的卡片支付），并沿用首次支付的信息重新申请授权。
  /paths/~1v1~1payments~1{id}~1auth/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，对 `id` 指定的支付重新执行授权。
  /paths/~1v1~1payments~1{id}~1change/put/summary: 变更支付金额
  /paths/~1v1~1payments~1{id}~1change/put/description: |-
    变更支付的使用金额。
    对已确认销售额的支付会变更实际收款金额；对仍处于预授权状态的支付会变更占用的信用额度。
  /paths/~1v1~1payments~1{id}~1change/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的支付中，变更 `id` 指定支付的使用金额。
  /paths/~1v1~1payments~1{id}~1barcode/put/summary: 生成条形码
  /paths/~1v1~1payments~1{id}~1barcode/put/description: 根据请求设备的信息，重新生成便利店支付条形码。
  /paths/~1v1~1payments~1{id}~1barcode/put/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在以该租户商户为销售主体的便利店支付中，为 `id` 指定的支付重新生成条形码。
  /paths/~1v1~1sessions/post/summary: 创建支付页面 URL
  /paths/~1v1~1sessions/post/description: 创建由 fincode 提供的重定向式支付页面，并返回该支付页面的 URL。
  /paths/~1v1~1sessions/post/parameters/0/description: |-
    <span class="smallText color--red-400">仅平台主商户可指定</span>
    租户商户 ID。
    在指定的租户商户上执行支付。
