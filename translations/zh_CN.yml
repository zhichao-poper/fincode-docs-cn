      - `0`：不共享；客户信息由各租户分别管理，各租户只能向本商户登记的客户收款
      - `1`：共享；客户信息在整个平台共享，所有租户均可向任意客户收款
    customer_group_id: 客户信息共享组 ID。fincode 会在具有相同组 ID 的商户之间共享客户信息。
    platform_rate_list: 按支付方式设置的平台手续费配置列表。
    send_mail_address: 通知接收邮箱地址。
    log_keep_days: 日志保留天数。
    api_version: API 版本。
    api_key_display_flag: |-
      管理后台是否显示 API Key。

      - `0`：不显示
      - `1`：显示
  TenantShop.Updating.Request:
    platform_rate: 当前租户使用 `id` 指定的支付方式时适用的单独平台使用费率。
    fixed_fee: 当前租户使用 `examination_master_id` 指定的支付方式时，如果按 `platform_rate` 计算的费用低于此值，则适用此单独最低平台使用费。
    web_registration_fee: 当前租户的客户成功通过 Web 登记自动扣款账户时适用的单独 Web 登记手续费。
    paypay_content_category_type: |-
      PayPay 审核确定的商品类别；PayPay 平台使用费率（`platform_rate`）按此类别设置。仅适用于 PayPay。

      - `1`：实物商品或服务商户
      - `2`：数字内容商户
    api_key_display_flag: |-
      是否在租户商户管理后台显示 API Key。

      - `0`：不显示
      - `1`：显示
    registration_number: 日本合规发票开具企业登记编号（T 编号）。请填写 `T` 后接 13 位数字。
    is_displayed: |-
      是否在各页面和报表中显示登记编号。设为 `false` 时，即使已登记编号也不会显示；非布尔值按未指定处理并保留现有值。

      - `false`：不显示
      - `true`：显示
    is_displayed_for_invoice: |-
      是否在账单中显示登记编号。仅当 `is_displayed` 为 `true` 时可设为 `true`；非布尔值按未指定处理并保留现有值。

      - `false`：不显示
      - `true`：显示
    is_displayed_for_tenant_account_detail: |-
      是否在租户销售明细中显示登记编号。仅当 `is_displayed` 为 `true` 时可设为 `true`；非布尔值按未指定处理并保留现有值。

      - `false`：不显示
      - `true`：显示
  ContentInfo.V2:
    content1_name: 商品或服务 1 的名称。
    content1_description: 商品或服务 1 的说明。
    content1_unit_price: 商品或服务 1 的单价。
    content2_name: 商品或服务 2 的名称。
    content2_description: 商品或服务 2 的说明。
    content2_unit_price: 商品或服务 2 的单价。
    content3_name: 商品或服务 3 的名称。
    content3_description: 商品或服务 3 的说明。
    content3_unit_price: 商品或服务 3 的单价。
