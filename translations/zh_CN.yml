    remitter_account_name: 汇款人（购买者）姓名。
    remitter_bank_name: 汇款人（购买者）的银行名称。
    remitter_branch_name: 汇款人（购买者）的银行分行名称。
    overpayment_flag: |-
      重复付款标志。同一笔支付发生多次付款时为 `1`。

      - `0`：付款 0 次或 1 次
      - `1`：向同一虚拟账户付款 2 次或以上
    cancel_overpayment_flag: |-
      取消后付款标志。取消支付后，购买者仍向虚拟账户付款时为 `1`。

      - `0`：取消后未付款
      - `1`：取消后已付款
    expire_overpayment_flag: |-
      过期后付款标志。超过支付期限后，购买者仍向虚拟账户付款时为 `1`。

