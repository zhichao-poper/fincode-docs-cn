      - `1`：实物商品或服务商户
      - `2`：数字内容商户
  Payment.Card.Executing.Request:
    token: 未指定 `customer_id` 和 `card_id` 时，填写通过 fincode JS 的 `tokens` 方法取得的银行卡令牌。
    card_id: 当前支付使用的银行卡 ID；未指定时使用默认银行卡。
    security_code: 使用已登记银行卡时，可以重新指定安全码。
    method: |-
      当当前支付的 `job_code` 为 `AUTH` 或 `CAPTURE` 时必须指定付款方式。

      - `1`：一次性付款
      - `2`：分期付款
      - `5`：循环信贷付款
    tds2_ret_url: |-
      3D Secure 认证回调 URL。后续处理数据会通过 POST 方法发送到此 URL。

      指定后，商户必须自行实现 3D Secure 所需的全部 API 调用和回调处理。如果希望由购买者浏览器与 fincode 自动完成认证，请不要指定本字段。
      详情参见 [使用 3D Secure 2.0 认证](/payment/fraud_protection/3d_secure_2)。
    return_url: |-
      由购买者浏览器与 fincode 自动执行 3D Secure 时，认证及支付成功后通过 POST 方法重定向的商户 URL。

      未指定时使用默认成功页面；指定 `tds2_ret_url` 时本字段会被忽略。
    return_url_on_failure: |-
      由购买者浏览器与 fincode 自动执行 3D Secure 时，认证或支付失败后通过 POST 方法重定向的商户 URL。

      未指定时使用默认失败页面；指定 `tds2_ret_url` 时本字段会被忽略。
  SubscriptionResult:
