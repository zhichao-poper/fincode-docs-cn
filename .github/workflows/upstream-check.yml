name: 检查上游规格更新

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * 1-5"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_upstream.py

