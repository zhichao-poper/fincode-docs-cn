          \n# ヘッダーを設定\nheaders = {\n    'Authorization': f'Bearer {api_key}',\n    'Tenant-Shop-Id': tenant_shop_id,\n}\n\n\
          try:\n    response = requests.get(url, headers=headers)\n\n    # レスポンスの処理\n    if response.status_code == 200:\n\
          \        # APIからのデータを処理\n        print(f\"Success: {response.json()}\")\n    else:\n        # エラーの処理\n        print(f\"\
