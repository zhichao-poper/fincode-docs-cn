          type: string
          description: '拒付类别，可使用半角逗号分隔指定多个值。


            - `0`：疑似欺诈使用

            - `1`：调查请求

            - `2`：确认欺诈使用'
        canceled:
          type: boolean
          description: '拒付取消状态。仅当 `status_code` 指定 `4009`（已结算）时有效，其他状态下本参数会被忽略。


            - `null`：同时返回已取消和未取消记录

            - `true`：仅返回已取消记录

            - `false`：仅返回未取消记录'
