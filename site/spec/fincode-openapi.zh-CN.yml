  /v1/contracts/examinations/tenants/{id}/files:
    post:
      security:
      - Secret-Bearer-Auth: []
      - Secret-Basic-Auth: []
      operationId: uploadExaminationFile
      tags:
      - 租户申请管理
      summary: 上传租户商户审核文件
      description: 上传审核 `id` 指定租户商户所需的文件。
      parameters:
      - name: id
        in: path
        description: 将文件上传至指定租户商户名下。还必须同时指定 `Tenant-Shop-Id` 请求头。
        schema:
          allOf:
          - $ref: '#/components/schemas/schema'
        required: true
      - in: header
        name: Tenant-Shop-Id
        required: true
        schema:
          allOf:
          - $ref: '#/components/schemas/schema'
        description: '<span class="smallText color--red-400">仅平台主商户可指定</span>

          租户商户 ID。

          将文件上传至指定租户商户名下。'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ExaminationFile.Uploading.Request'
      responses:
        '200':
          description: 请求成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExaminationFile.Uploading.Response'
        '400':
          description: 请求无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FincodeAPIError.Response'
      x-code-samples:
      - lang: curl
        label: cURL
        source: "curl \\\n    -X POST \\\n    -H \"Authorization:Bearer <Secret API Key>\" \\\n    -H \"Content-Type: multipart/form-data\"\
          \ \\\n    -H \"Tenant-Shop-Id: <Tenant Shop ID>\" \\\n    -F \"data=@<Path To File>;type=application/json;filename=\\\
          \"<File Name>\\\"\" \\\n    -F \"type=DRIVER_LICENSE_FRONT\"\n'https://api.test.fincode.jp/v1/contracts/examinations/tenants/{Tenant\
          \ Shop ID}/files'\n"
      - lang: node
        label: Node.js
        source: "import fetch from \"node-fetch\";\nimport FormData from \"form-data\";\nimport * as fs from \"fs\";\n\nconst\
          \ BASE_URL = \"https://api.test.fincode.jp\";\n\nconst API_KEY = \"<Secret API Key>\";\n\n(async () => {\n    const\
          \ tenantShopId = \"<Tenant Shop ID>\";\n\n    const endpoint = `${BASE_URL}/v1/contracts/examinations/tenants/${tenantShopId}/files`;\n\
          \n    const form = new FormData();\n\n    // ファイル種別を指定（例として SALES_LICENSE_1: 販売免許証1）\n    form.append(\"type\",\
          \ \"SALES_LICENSE_1\");\n\n    // ファイルを指定\n    const filePath = \"<Path to File>\";\n    const fileName = \"<File\
          \ Name>\";\n    const file = fs.createReadStream(filePath);\n    form.append(\"data\", file, fileName);\n\n    const\
          \ response = await fetch(endpoint, {\n        method: \"POST\",\n        headers: {\n            Authorization:\
          \ `Bearer ${API_KEY}`,\n            \"Content-Type\": `multipart/form-data; boundary=${form._boundary}`,\n     \
          \       \"Tenant-Shop-Id\": tenantShopId,\n        },\n        body: form,\n    });\n    const result = await response.json();\n\
          })();\n"
      - lang: go
        label: Go
        source: "package main\n\nimport (\n\t\"bytes\"\n\t\"fmt\"\n\t\"io\"\n\t\"log\"\n\t\"mime/multipart\"\n\t\"net/http\"\
          \n\t\"os\"\n)\n\nfunc main() {\n\n\tapiKey := \"<Secret API Key>\"\n\n\ttenantShopID := \"<Tenant Shop ID>\"\n\n\
          \t// ファイルの読み込み\n\tfilePath := \"<Path To File>\"\n\tfileName := \"<File Name>\"\n\tfile, err := os.Open(filePath)\n\
          \tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\tdefer file.Close()\n\n\t// バッファの作成\n\tbody := &bytes.Buffer{}\n\t\
          writer := multipart.NewWriter(body)\n\n\t// ファイルの書き込み\n\tpart, err := writer.CreateFormFile(\"data\", fileName)\n\
          \tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\t_, err = io.Copy(part, file)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\
          \t}\n\n\t// 追加情報（ファイル種別）の書き込み\n\t_ = writer.WriteField(\"type\", \"DRIVER_LICENSE_FRONT\")\n\n\t// リクエストの作成\n\t\
          req, _ := http.NewRequest(\"POST\", fmt.Sprintf(\"https://api.test.fincode.jp/v1/contracts/examinations/tenants/%s/files\"\
          , tenantShopID), body)\n\treq.Header.Set(\"Authorization\", fmt.Sprintf(\"Bearer %s\", apiKey))\n\treq.Header.Set(\"\
          Content-Type\", writer.FormDataContentType())\n\treq.Header.Set(\"Tenant-Shop-Id\", tenantShopID)\n\n\t// リクエストの送信\n\
          \tclient := &http.Client{}\n\tres, err := client.Do(req)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\tdefer res.Body.Close()\n\
          }\n"
      - lang: php
        label: PHP
        source: "<?php\n\n$apiKey = '<Secret API Key>';\n\n$tenantShopId = '<Tenant Shop ID>';\n\n$baseUrl = \"https://api.test.fincode.jp\"\
          ;\n$endpoint = \"/v1/contracts/examinations/tenants/{$tenantShopId}/files\";\n$headers = [\n    \"Authorization:\
          \ Bearer \" . $apiKey,\n];\n\n$filePath = '<Path to file>';\n$fileName = '<File Name>';\n\n// 販売免許等1 をアップロードする場合\n\
          $fields = [\n    \"data\" => new CURLFile($filePath, null, $fileName),\n    \"type\" => 'SALES_LICENSE_1',\n];\n\
          \n$session = curl_init();\ncurl_setopt($session, CURLOPT_URL, $baseUrl . $endpoint);\ncurl_setopt($session, CURLOPT_HTTPHEADER,\
          \ $headers);\ncurl_setopt($session, CURLOPT_POST, true);\ncurl_setopt($session, CURLOPT_POSTFIELDS, $fields);\n\
          curl_setopt($session, CURLOPT_RETURNTRANSFER, true);\n// curl_setopt($session, CURLOPT_SSL_VERIFYPEER, );\n// curl_setopt($session,\
          \ CURLOPT_SSL_VERIFYHOST, );\n\n$response = curl_exec($session);\n\nif ($response === false) {\n    # エラー処理\n  \
          \  echo \"cURL Error: \" . curl_error($session);\n} else {\n    # APIからのデータを処理\n    var_dump($response);\n}\n\n\
          curl_close($session);\n"
      - lang: python
        label: Python 3
        source: "import requests\n\ndef main():\n    api_key = '<Secret API Key>'\n\n    tenant_shop_id = '<Tenant Shop ID>'\n\
          \n    file_path = '<Path to file>'\n    file_name = '<File Name>'\n\n    with open(file_path, 'rb') as file:\n \
          \       files = {'data': (file_name, file)}\n\n        # 追加情報（ファイル種別）の指定\n        payload = {'type': 'DRIVER_LICENSE_FRONT'}\n\
          \n        url = f'https://api.test.fincode.jp/v1/contracts/examinations/tenants/{tenant_shop_id}/files'\n\n    \
          \    # ヘッダーを設定\n        headers = {\n            'Authorization': f'Bearer {api_key}',\n            'Tenant-Shop-Id':\
          \ tenant_shop_id,\n        }\n\n        # HTTP POSTリクエストの送信\n        try:\n            response = requests.post(url,\
          \ headers=headers, files=files, data=payload)\n\n            # レスポンスの処理\n            if response.status_code ==\
          \ 200:\n                # 成功した場合の処理\n                print(f\"Success: {response.json()}\")\n            else:\n\
          \                # エラーの処理\n                print(f\"Error: {response.json()} {response.text}\")\n        except\
          \ requests.RequestException as e:\n            # 通信エラーの処理\n            print(f\"Request error: {e}\")\n\nif __name__\
          \ == '__main__':\n    main()\n"
      - lang: ruby
        label: Ruby
        source: "require 'net/http'\nrequire 'uri'\nrequire 'mime/types'\n\n\nAPI_KEY = '<Secret API Key>'\nBASE_URL = 'https://api.test.fincode.jp'\n\
          \ndef main\n    tenant_shop_id = '<Tenant Shop ID>'\n    endpoint = \"/v1/contracts/examinations/tenants/#{tenant_shop_id}/files\"\
          \n    uri = URI.parse(BASE_URL + endpoint)\n\n    http = Net::HTTP.new(uri.host, uri.port)\n    http.use_ssl = true\n\
          \n    file_path = '<Path to file>'\n    file_name = '<File Name>'\n    \n    file = File.open(file_path, 'rb')\n\
          \    file_data = file.read\n    file.close\n\n    # リクエストの作成\n    request = Net::HTTP::Post.new(uri.request_uri)\n\
          \    request['Authorization'] = \"Bearer #{API_KEY}\"\n    request['Tenant-Shop-Id'] = tenant_shop_id\n\n    # ファイルと追加情報をマルチパートフォームデータに追加\n\
          \    boundary = '----FincodeMultipartRequest'\n    body = []\n    insert_file_to_body(body, boundary, 'data', file_name,\
          \ file_data)\n    insert_data_to_body(body, boundary, 'type', \"DRIVER_LICENSE_FRONT\")\n    body << \"--#{boundary}--\\\
          r\\n\"\n\n    request['Content-Type'] = \"multipart/form-data; boundary=#{boundary}\"\n    request.body = body.join('')\n\
          \n    # リクエストの送信\n    response = http.request(request)\n\n    case response\n    when Net::HTTPSuccess\n       \
          \ puts 'SUCCESS'\n    else\n        puts 'ERROR'\n    end\n\n    # レスポンスの表示\n    puts response.body\nend\n\ndef\
          \ insert_file_to_body(body, boundary, key, file_name, file_data)\n    body << \"--#{boundary}\\r\\n\"\n    body\
          \ << \"Content-Disposition: form-data; name=\\\"#{key}\\\"; filename=\\\"#{file_name}\\\"\\r\\n\"\n    body << \"\
          Content-Type: #{MIME::Types.type_for(file_name).first.content_type}\\r\\n\"\n    body << \"\\r\\n\"\n    body <<\
          \ file_data\n    body << \"\\r\\n\"\nend\n\ndef insert_data_to_body(body, boundary, key, value)\n    body << \"\
          --#{boundary}\\r\\n\"\n    body << \"Content-Disposition: form-data; name=\\\"#{key}\\\"\\r\\n\"\n    body << \"\
          \\r\\n\"\n    body << value\n    body << \"\\r\\n\"\nend\n\nmain\n"
