      responses:
        '200':
          description: 请求成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSetting.Deleting.Response'
        '400':
          description: 请求无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FincodeAPIError.Response'
      x-code-samples:
      - lang: curl
        label: cURL
        source: "curl \\\n    -X DELETE \\\n    -H \"Authorization:Bearer <Secret API Key>\" \\\n'https://api.test.fincode.jp/v1/webhook_settings/{id}'\n"
      - lang: node
        label: Node.js
        source: "import { createFincode } from \"@fincode/node\";\n\nconst API_KEY = \"<Secret API Key>\";\n\n(async () =>\
          \ {\n    const fincode = createFincode({ apiKey: API_KEY, isLiveMode: false });\n\n    const webhookSettingId =\
          \ \"<Webhook Setting ID>\";\n\n    try {\n        // リクエストの送信\n        const result = await fincode.webhookSettings.delete(webhookSettingId);\n\
          \    } catch (e) {\n        // エラーの処理\n    }\n})();\n"
      - lang: go
        label: Go
        source: "package main\n\nimport (\n\t\"fmt\"\n\t\"log\"\n\t\"net/http\"\n)\n\nfunc main() {\n\n\tapiKey := \"<Secret\
          \ API Key>\"\n\n\twebhookSettingID := \"<Webhook Setting ID>\"\n\n\t// リクエストの作成\n\treq, _ := http.NewRequest(\n\t\
          \t\"DELETE\",\n\t\tfmt.Sprintf(\"https://api.test.fincode.jp/v1/webhook_settings/%s\", webhookSettingID),\n\t\t\
          nil,\n\t)\n\treq.Header.Set(\"Authorization\", fmt.Sprintf(\"Bearer %s\", apiKey))\n\n\t// リクエストの送信\n\tclient :=\
          \ &http.Client{}\n\tres, err := client.Do(req)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\tdefer res.Body.Close()\n\
          }\n"
      - lang: php
        label: PHP
        source: "<?php\n\n$apiKey = '<Secret API Key>';\n\n$webhookSettingId = '<Webhook Setting ID>';\n\n$baseUrl = \"https://api.test.fincode.jp\"\
          ;\n$endpoint = \"/v1/webhook_settings/{$webhookSettingId}\";\n$headers = [\n    \"Authorization: Bearer \" . $apiKey,\n\
          ];\n\n$session = curl_init();\ncurl_setopt($session, CURLOPT_URL, $baseUrl . $endpoint);\ncurl_setopt($session,\
          \ CURLOPT_HTTPHEADER, $headers);\ncurl_setopt($session, CURLOPT_CUSTOMREQUEST, 'DELETE');\ncurl_setopt($session,\
          \ CURLOPT_RETURNTRANSFER, true);\n// curl_setopt($session, CURLOPT_SSL_VERIFYPEER, );\n// curl_setopt($session,\
          \ CURLOPT_SSL_VERIFYHOST, );\n\n$response = curl_exec($session);\n\nif ($response === false) {\n    # エラー処理\n  \
          \  echo \"cURL Error: \" . curl_error($session);\n} else {\n    # APIからのデータを処理\n    var_dump($response);\n}\n\n\
          curl_close($session);\n"
      - lang: python
        label: Python 3
        source: "import requests\n\napi_key = '<Secret API Key>'\n\nwebhook_setting_id = '<Webhook Setting ID>'\n\nurl = f'https://api.test.fincode.jp/v1/webhook_settings/{webhook_setting_id}'\n\
          \n# ヘッダーを設定\nheaders = {\n    'Authorization': f'Bearer {api_key}',\n}\n\ntry:\n    response = requests.delete(url,\
          \ headers=headers)\n\n    # レスポンスの処理\n    if response.status_code == 200:\n        # APIからのデータを処理\n        print(f\"\
          Success: {response.json()}\")\n    else:\n        # エラーの処理\n        print(f\"Error: {response.json()}\")\nexcept\
          \ requests.RequestException as e:\n    # 通信エラーの処理\n    print(f\"Request error: {e}\")\n"
      - lang: ruby
        label: Ruby
        source: "require 'net/http'\nrequire 'uri'\n\nAPI_KEY = '<Secret API Key>'\nBASE_URL = 'https://api.test.fincode.jp'\n\
          \ndef main\n    webhook_setting_id = '<Webhook Setting ID>'\n    endpoint = \"/v1/webhook_settings/#{webhook_setting_id}\"\
          \n\n    uri = URI.parse(BASE_URL + endpoint)\n\n    http = Net::HTTP.new(uri.host, uri.port)\n    http.use_ssl =\
          \ true\n\n    # リクエストの作成\n    request = Net::HTTP::Delete.new(uri.request_uri)\n    request['Authorization'] = \"\
          Bearer #{API_KEY}\"\n\n    # リクエストの送信\n    response = http.request(request)\n\n    case response\n    when Net::HTTPSuccess\n\
          \        puts 'SUCCESS'\n    else\n        puts 'ERROR'\n    end\n\n    # レスポンスの表示\n    puts response.body\nend\n\
          \nmain\n"
