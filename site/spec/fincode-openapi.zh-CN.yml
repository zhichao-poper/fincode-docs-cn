            未填写时，自动使用客户的 `addr_line_1`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。'
        tds2_bill_addr_line_2:
          type: string
          example: ヒューマックス渋谷ビル
          minLength: 1
          maxLength: 50
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户账单地址的第 2 行，请填写建筑物名称、房间号等信息。


