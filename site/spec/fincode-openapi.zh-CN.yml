      maxLength: 3
      description: '便利店运营商处理结果代码。


        - `000`：正常完成

        - `001`：认证失败

        - `002`：订单登记成功，但无法确认设备信息，未签发条形码图片

        - `003`：必填字段不完整

        - `004`：条形码数据标识符无效

        - `005`：条形码数据制造商代码无效

        - `006`：条形码数据企业识别代码无效

        - `007`：超过支付期限或日期格式无效

        - `008`：支付金额超出上下限

        - `009`：整体校验位无效

        - `010`：其他原因导致条形码图片签发失败

        - `011`：印花税标志（内部数据）无效

        - `012`：设备信息长度无效

        - `013`：相同条形码已经登记

        - `900`：意外错误'
