          \t// ファイルの読み込み\n\tfilePath := \"<Path To File>\"\n\tfileName := \"<File Name>\"\n\tfile, err := os.Open(filePath)\n\
          \tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\tdefer file.Close()\n\n\t// バッファの作成\n\tbody := &bytes.Buffer{}\n\t\
          writer := multipart.NewWriter(body)\n\n\t// ファイルの書き込み\n\tpart, err := writer.CreateFormFile(\"data\", fileName)\n\
          \tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\t_, err = io.Copy(part, file)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\
          \t}\n\n\t// 追加情報（ファイル種別）の書き込み\n\t_ = writer.WriteField(\"type\", \"DRIVER_LICENSE_FRONT\")\n\n\t// リクエストの作成\n\t\
          req, _ := http.NewRequest(\"POST\", fmt.Sprintf(\"https://api.test.fincode.jp/v1/contracts/examinations/tenants/%s/files\"\
          , tenantShopID), body)\n\treq.Header.Set(\"Authorization\", fmt.Sprintf(\"Bearer %s\", apiKey))\n\treq.Header.Set(\"\
