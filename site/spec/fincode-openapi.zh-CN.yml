              minLength: 3
              maxLength: 3
            tds2_pre_order_date:
              type: string
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                商品预计发售日期。

                格式：`YYYYMMDD`'
              minLength: 8
              maxLength: 8
            tds2_pre_order_purchase_ind:
              type: string
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                商品销售状态。


                - `01`：已发售商品

                - `02`：预售商品'
              minLength: 2
              maxLength: 2
            tds2_reorder_items_ind:
              type: string
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

