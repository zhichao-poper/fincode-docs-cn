          description: "记录批量支付信息的 JSON 文件。各参数格式遵循支付登记和支付执行 API，`*` 表示必填。\n\n`pay_type = Card` 时上传以下结构：\n\n```json\n{\n  \"\
            data\": [\n    {\n      \"id\": \"order_001\",\n      \"amount\": \"1000\",\n      \"tax\": \"100\",\n      \"\
            customer_id\": \"c_**********************\",\n      \"card_id\": \"cs_**********************\",\n      \"client_field_1\"\
            : \"自由字段1\",\n      \"client_field_2\": \"自由字段2\",\n      \"client_field_3\": \"自由字段3\"\n    }\n  ]\n}\n```\n\n\
            - `data`：支付信息数组\n- `data[].id`：订单 ID\n- `data[].amount`：使用金额*\n- `data[].tax`：税费及运费\n- `data[].customer_id`：客户\
            \ ID*\n- `data[].card_id`：银行卡 ID\n- `data[].client_field_1`～`data[].client_field_3`：商户自由字段\n\n`pay_type = Virtualaccount`\
            \ 时上传以下结构：\n\n```json\n{\n  \"data\": [\n    {\n      \"id\": \"order_001\",\n      \"billing_amount\": \"1000\"\
            ,\n      \"billing_tax\": \"100\",\n      \"customer_id\": \"c_**********************\",\n      \"payment_method_id\"\
            : \"pm_**********************\",\n      \"client_field_1\": \"自由字段1\",\n      \"client_field_2\": \"自由字段2\",\n\
            \      \"client_field_3\": \"自由字段3\"\n    },\n    {\n      \"id\": \"order_002\",\n      \"billing_amount\": \"\
            1000\",\n      \"payment_term_day\": \"2\",\n      \"reference_order_id\": \"order_101\",\n      \"use_exact_deposit_amount\"\
            : true\n    }\n  ]\n}\n```\n\n- `data`：支付信息数组\n- `data[].id`：订单 ID\n- `data[].billing_amount`：请款金额*\n- `data[].billing_tax`：请款税费及运费\n\
            - `data[].customer_id`：客户 ID\n- `data[].payment_method_id`：支付方式 ID\n- `data[].client_field_1`～`data[].client_field_3`：商户自由字段\n\
            - `data[].payment_term_day`：支付期限天数\n- `data[].reference_order_id`：用于复用虚拟账户的订单 ID\n- `data[].use_exact_deposit_amount`：可入账金额设置"
