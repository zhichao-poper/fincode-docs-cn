      - name: Tenant-Shop-Id
        in: header
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/schema'
        description: '<span class="smallText color--red-400">※ プラットフォームのメインショップのみ指定可</span>\

          テナントショップID。\

