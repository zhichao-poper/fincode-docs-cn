      type: string
      enum:
      - UC
      - TFC
      - ORICO
      - JCB/AMEX
      - DINERS
      - APPLE PAY UC
      - APPLE PAY JCB/AMEX
      - GOOGLE PAY UC
      - GOOGLE PAY TFC
      - GOOGLE PAY ORICO
      - GOOGLE PAY JCB
      - PAYSLE
      - PAYPAY
      - DIRECT DEBIT
      - DIRECT DEBIT MIZUHO
      - VIRTUAL ACCOUNT
      - VIRTUAL ACCOUNT BULK
      description: '审核对象。以下代码值对应支付服务商或支付方式：


        - `UC`：VISA/Mastercard（UC Card）

        - `TFC`：VISA/Mastercard（Toyota Finance）

        - `ORICO`：VISA/Mastercard（Orient Corporation）

        - `JCB/AMEX`：JCB/AMEX（JCB）

        - `DINERS`：Diners（JCB）

        - `APPLE PAY UC`：Apple Pay（UC Card）

        - `APPLE PAY JCB/AMEX`：Apple Pay（JCB）

        - `GOOGLE PAY UC`：Google Pay（UC Card）

        - `GOOGLE PAY TFC`：Google Pay（Toyota Finance）

        - `GOOGLE PAY ORICO`：Google Pay（Orient Corporation）

        - `GOOGLE PAY JCB`：Google Pay（JCB）

        - `PAYSLE`：便利店支付（Densan System）

        - `PAYPAY`：PayPay

        - `DIRECT DEBIT`：银行账户自动扣款（每月 5、6、23、27 日）

        - `DIRECT DEBIT MIZUHO`：银行账户自动扣款（每月 1、5、20、26 日）

        - `VIRTUAL ACCOUNT`：银行转账（虚拟账户）

        - `VIRTUAL ACCOUNT BULK`：批量支付（虚拟账户）'
      x-ja-description: '審査対象（和名）


        - `決済事業者審査: VISA/MASTER-UC`

