    AccountDetailTradeType:
      type: integer
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      example: 1
      description: '交易类型。不同值决定汇总销售结算明细时对使用金额进行加算或减算。


        - `1`：支付（加算），由一笔支付产生

        - `2`：退款（减算），由一笔支付取消产生

        - `3`：拒付（减算），由一笔拒付产生

        - `4`：调整（加算），用于调整销售结算；减算时也可能返回负数

        - `5`：取消拒付（加算），由一笔拒付被取消产生

        - `6`：自动扣款失败手续费（减算）

        - `7`：自动扣款账户 Web 登记手续费（减算）

        - `8`：自动扣款账户纸质申请书登记手续费（减算）

        - `10`：虚拟账户可入账金额设置手续费（减算）

        - `11`：客户固定虚拟账户登记手续费（减算）

        - `12`：虚拟账户批量支付未使用手续费（减算）'
    AccountPaymentMethod:
      type: string
      enum:
      - VM
      - JA
      - KONBINI
      - PayPay
      - ApplepayVM
      - ApplepayJA
      - GooglepayVM
      - GooglepayJA
      - Directdebit
      - DirectdebitMizuho
      - Virtualaccount
      example: VM
      description: '当前销售结算明细对应支付所使用的支付方式。


        - `VM`：银行卡（VISA/Mastercard）

        - `JA`：银行卡（JCB/American Express/Diners Club/Discover）

        - `KONBINI`：便利店支付

        - `Paypay`：PayPay

        - `ApplepayVM`：Apple Pay（VISA/Mastercard）

        - `ApplepayJA`：Apple Pay（JCB/American Express/Discover）

        - `GooglepayVM`：Google Pay（VISA/Mastercard）

        - `GooglepayJA`：Google Pay（JCB/American Express/Diners Club）

        - `Directdebit`：银行账户自动扣款（每月 5、6、23、27 日）

        - `DirectdebitMizuho`：银行账户自动扣款（每月 1、5、20、26 日）

        - `Virtualaccount`：银行转账（虚拟账户）'
