            指定为 `true` 时，只获取查询结果的总条数（`total_count`）。'
      x-common-properties:
        sort:
          type: string
          example: updated␣desc,created␣asc
    sort:
      type: string
      example: updated␣desc,created␣asc
    Customer.ListRetrieving.QueryParams:
      type: object
      properties:
        id:
          type: string
          nullable: true
          minLength: 1
          maxLength: 60
          example: c_**********************
