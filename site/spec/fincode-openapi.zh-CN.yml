        - `CERTIFICATE_OF_RESIDENCE_FRONT`：住民票正面

        - `MY_NUMBER_CARD_FRONT`：个人编号卡正面

        - `PRODUCT_IMAGE_1`：实物商品 1 图片，对应 `product_content_info.content1_*`

        - `PRODUCT_IMAGE_2`：实物商品 2 图片，对应 `product_content_info.content2_*`

        - `PRODUCT_IMAGE_3`：实物商品 3 图片，对应 `product_content_info.content3_*`

        - `APP_IMAGE_TOP`：原生应用首页截图；审核时没有网站的原生应用需要提交

        - `APP_IMAGE_ICON`：原生应用图标；审核时没有网站的原生应用需要提交

        - `SALES_LICENSE_1`：销售许可证等第 1 个文件。酒类、古物、隐形眼镜、象牙等商品可能需要提交对应许可证，许可证名义必须与签约名义一致；支付服务商要求时也可能需要提交

        - `SALES_LICENSE_2`：许可证等包含多个文件时的第 2 个文件

        - `SALES_LICENSE_3`：许可证等包含多个文件时的第 3 个文件'
