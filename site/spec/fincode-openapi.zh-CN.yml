            客户收货地址的第 1 行。'
        tds2_ship_addr_line_2:
          type: string
          example: ヒューマックス渋谷ビル
          minLength: 1
          maxLength: 50
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户收货地址的第 2 行。'
        tds2_ship_addr_line_3:
          type: string
          example: 7F
          minLength: 1
          maxLength: 50
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户收货地址的第 3 行。'
        tds2_ship_addr_post_code:
          type: string
          example: 150-0043
          minLength: 1
          maxLength: 16
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户收货地址的邮政编码。'
        tds2_ship_ind:
          type: string
          enum:
          - '01'
          - '02'
          - '03'
          - '04'
          - '05'
          - '06'
          - '07'
          example: '01'
          minLength: 2
          maxLength: 2
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            交易商品的配送方式。


            - `01`：配送至持卡客户的账单地址

            - `02`：配送至商户保存的其他已验证地址

            - `03`：配送至与持卡客户账单地址不同的地址

            - `04`：配送至门店或到附近门店自提（门店地址通过收货地址指定）

            - `05`：数字商品（包括在线服务、电子礼品卡及兑换码）

            - `06`：无需配送（旅行及活动门票）

            - `07`：其他（游戏、无需配送的数字服务、电子媒体订阅费等）'
        tds2_delivery_email_address:
          type: string
          example: email@example.com
          minLength: 1
          maxLength: 254
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            商品交付联系邮箱。'
        tds2_home_phone_cc:
          type: string
          example: '81'
          minLength: 1
          maxLength: 3
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户家庭电话号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_home_phone_no`。


            未填写时，自动使用客户的 `phone_cc`。'
        tds2_home_phone_no:
          type: string
          example: '312345678'
          minLength: 1
          maxLength: 15
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户家庭电话号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_home_phone_cc`。


            未填写时，自动使用客户的 `phone_no`。自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email`
            必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。'
        tds2_mobile_phone_cc:
          type: string
          example: '81'
          minLength: 1
          maxLength: 3
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户手机号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_mobile_phone_no`。'
        tds2_mobile_phone_no:
          type: string
          example: '9012345678'
          minLength: 1
          maxLength: 15
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户手机号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_mobile_phone_cc`。


            自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email` 必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。'
        tds2_work_phone_cc:
          type: string
          example: '81'
          minLength: 1
          maxLength: 3
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户工作单位电话号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_work_phone_no`。'
        tds2_work_phone_no:
          type: string
          example: '312345678'
          minLength: 1
          maxLength: 15
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户工作单位电话号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_work_phone_cc`。


            自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email` 必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。'
        tds2_delivery_timeframe:
          type: string
          enum:
          - '01'
          - '02'
          - '03'
          - '04'
          example: '01'
          minLength: 2
          maxLength: 2
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            商品交付时间范围。


            - `01`：电子交付

            - `02`：当日发货

            - `03`：次日发货

            - `04`：第 2 天及以后发货'
        tds2_pre_order_date:
          type: string
          example: '20231231'
          minLength: 8
          maxLength: 8
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            商品预计发售日期。

            格式：`YYYYMMDD`'
        tds2_pre_order_purchase_ind:
          type: string
          enum:
          - '01'
          - '02'
          example: '01'
          minLength: 2
          maxLength: 2
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            商品销售状态。


            - `01`：已发售商品

            - `02`：预售商品'
        tds2_reorder_items_ind:
          type: string
          enum:
          - '01'
          - '02'
          example: '01'
          minLength: 2
          maxLength: 2
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            表示本次商品订单是首次购买还是重复购买。


            - `01`：首次购买

            - `02`：重复购买'
        tds2_recurring_expiry:
          type: string
          example: '20231231'
          minLength: 8
          maxLength: 8
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            仅限订阅等持续扣款业务使用。填写持续扣款的结束日期。

            格式：`YYYYMMDD`'
        tds2_recurring_frequency:
          type: string
          example: '99'
          minLength: 1
          maxLength: 4
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            仅限订阅等持续扣款业务使用。填写持续扣款的最短扣款间隔天数。'
        tds2_gift_card_amount:
          type: string
          example: '999999'
          minLength: 1
          maxLength: 15
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            仅限购买预付卡或礼品卡时使用。填写预付卡或礼品卡的购买总金额。'
        tds2_gift_card_count:
          type: string
          example: '99'
          minLength: 1
          maxLength: 2
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            仅限购买预付卡或礼品卡时使用。填写已购买的预付卡或礼品卡总数量。'
        tds2_gift_card_curr:
          type: string
          example: '392'
          minLength: 1
          maxLength: 3
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            仅限购买预付卡或礼品卡时使用。填写预付卡或礼品卡的货币代码。

            格式：ISO 4217 numeric


            不可使用以下货币代码（债券市场单位等）：`955`、`956`、`957`、`958`、`959`、`960`、`961`、`962`、`963`、`964`、`999`。'
    PaymentSession.Konbini:
      type: object
      properties:
        konbini_reception_url:
          type: string
          nullable: true
          maxLength: 256
          example: https://secure.test.fincode.jp/v1/links/lk_**********************/konbini
          description: 便利店支付页面 URL。
        payment_term_day:
          type: integer
          format: int64
          nullable: true
          minLength: 1
          maxLength: 3
          example: 2
          description: '便利店支付期限天数。

            表示可在门店收银台付款的期限天数。'
        konbini_reception_mail_send_flag:
          type: string
          nullable: false
          enum:
          - '0'
          - '1'
          example: '1'
          description: '是否发送便利店支付页面引导邮件。


            - `0`：不发送

            - `1`：发送'
      x-req-properties:
        payment_term_day:
          type: string
          nullable: true
          minLength: 1
          maxLength: 3
          example: '2'
          description: '便利店支付期限天数。

            表示可在门店收银台付款的期限天数。'
    PaymentSession.PayPay:
      type: object
      properties:
        job_code:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/PayPayPaymentJobCode'
          description: '使用 PayPay 支付时的处理类型。


            - `AUTH`：仅授权

            - `CAPTURE`：立即确认请款'
        order_description:
          nullable: true
          type: string
          maxLength: 100
          example: Your Shop上での購入
          description: 支付时在购买者 PayPay 应用中显示的订单说明。
    PaymentSession.VirtualAccount:
      type: object
      properties:
        virtualaccount_reception_url:
          type: string
          nullable: true
          maxLength: 256
          example: https://secure.test.fincode.jp/v1/links/lk_**********************/virtualaccount
          description: 银行转账（虚拟账户）支付页面 URL。
        payment_term_day:
          type: integer
          format: int64
          minLength: 1
          maxLength: 2
          example: 90
          description: '付款期限天数。


            从执行日算起，在期限天数后的次日上午过期。

            示例：2024/4/1 执行支付且付款期限天数为 `2` 时，于 2024/4/4 上午过期。'
        virtualaccount_reception_mail_send_flag:
          type: string
          nullable: false
          enum:
          - '0'
          - '1'
          example: '1'
          description: '是否发送银行转账（虚拟账户）支付页面引导邮件。


            - `0`：不发送

            - `1`：发送'
        use_exact_deposit_amount:
          type: boolean
          enum:
          - true
          - false
          description: '可入账金额限制标志。

            表示是否为本次支付使用的虚拟账户设置可入账金额。启用后，购买者只能转入应付金额。


            - `true`：设置可入账金额

            - `false`：不设置可入账金额（默认）'
      x-req-properties:
        reference_order_id:
          allOf:
          - $ref: '#/components/schemas/Payment_properties-id'
          description: '虚拟账户复用参考订单 ID。


            复用其他订单的虚拟账户时，指定该支付的订单 ID 作为参考。可复用的支付必须同时满足：


            1. 参考支付的 `status` 为 `CAPTURED`、`CANCELED` 或 `EXPIRED`

            2. 距离向该支付所关联虚拟账户的最近一次转账不超过 90 天'
        payment_term_day:
          type: string
          nullable: true
          minLength: 1
          maxLength: 2
          example: '90'
          description: '付款期限天数。


            指定可向虚拟账户转账的期限天数，范围为 `0` 至 `99` 天。

            从执行日算起，在期限天数后的次日上午过期。

            示例：2024/4/1 执行支付且付款期限天数为 `2` 时，于 2024/4/4 上午过期。'
        use_exact_deposit_amount:
          type: boolean
          enum:
          - true
          - false
          description: '可入账金额限制标志。

            指定是否为本次支付使用的虚拟账户设置可入账金额。启用后，购买者只能转入应付金额。


            - `true`：设置可入账金额

            - `false`：不设置可入账金额（默认）'
    PaymentSession:
      type: object
      properties:
