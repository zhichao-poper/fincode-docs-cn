        - `8`：因商户原因而失败<br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>

        - `9`：其他失败<br /><span class="smallText">通常不会出现。如需调查，请联系 fincode。</span>

        - `E`：因数据错误而失败<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系
        fincode。</span>

        - `N`：未收到扣款结果<br /><span class="smallText">仅适用于每月 5、6、23、27 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系
