      minLength: 1
      maxLength: 1
      nullable: true
      description: '发卡机构不支持 3D Secure 2.0 时的后续处理方式。


        - `1`：执行 3D Secure 1.0 认证

        - `2`：按错误结束处理（默认）

        - `3`：不执行 3D Secure 认证，直接进行常规授权'
    tds2_ret_url:
      type: string
      example: https://your-server.example.com/3ds2-return
      maxLength: 256
      nullable: true
      description: '3D Secure 认证回调 URL，仅在商户自行实现全部认证 API 调用和回调处理时使用。fincode 会在认证过程中使用 POST 方法及 `Content-Type: application/x-www-form-urlencoded`
        向此 URL 返回数据。


        - `MD`：通过查询参数返回，值与 `access_id` 相同

        - `event`：通过表单数据返回，用于判断并分支后续处理

        - `param`：通过表单数据返回，供 [3D Secure 认证 API](https://docs.fincode.jp/api#tag/ThreeDSecureecure/executeThreeDSecureecureAuth)
        使用

        - `requestorTransId`：通过表单数据返回，后续处理不使用


        详情参见 [3D Secure 2.0 文档](https://docs.fincode.jp/payment/fraud_protection/3d_secure_2)。'
