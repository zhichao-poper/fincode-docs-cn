      type: string
      nullable: false
      enum:
      - '0'
      - '1'
      example: '1'
      description: 'コンビニ決済 支払い画面案内メール送信フラグ\

        コンビニ決済の支払い画面案内メールを送信するかどうかを設定します。


        - `0`：送信しない

        - `1`：送信する

        '
    properties-order_description:
