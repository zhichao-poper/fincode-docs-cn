              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户账单地址的城市名称。


                未填写时，自动使用客户的 `addr_city`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。'
              minLength: 1
              maxLength: 50
            tds2_bill_addr_country:
              type: string
