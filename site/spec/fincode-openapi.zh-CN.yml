      - lang: node
        label: Node.js
        source: "import fetch from \"node-fetch\";\nimport FormData from \"form-data\";\nimport fs from \"fs\";\n\nconst BASE_URL\
          \ = \"https://api.test.fincode.jp\";\nconst API_KEY = \"<Secret API Key>\";\n\n(async () => {\n    const endpoint\
          \ = `${BASE_URL}/v1/company_stamps`;\n\n    const form = new FormData();\n    form.append(\"data\", fs.createReadStream(\"\
          /path/to/your/company_stamp.png\"));\n\n    const response = await fetch(endpoint, {\n        method: \"POST\",\n\
          \        headers: {\n            Authorization: `Bearer ${API_KEY}`,\n            ...form.getHeaders(),\n      \
          \  },\n        body: form,\n    });\n\n    if (!response.ok) {\n        console.error(`Error: ${response.statusText}`);\n\
          \        return;\n    }\n\n    const data = await response.json();\n    console.log(data);\n})();\n"
      - lang: go
        label: Go
        source: "package main\n\nimport (\n\t\"bytes\"\n\t\"fmt\"\n\t\"io\"\n\t\"log\"\n\t\"mime/multipart\"\n\t\"net/http\"\
          \n\t\"os\"\n)\n\nfunc main() {\n\tapiKey := \"<Secret API Key>\"\n\n\tbody := &bytes.Buffer{}\n\twriter := multipart.NewWriter(body)\n\
          \n\tfile, err := os.Open(\"/path/to/your/company_stamp.png\")\n\tif err != nil {\n\t\tlog.Fatalf(\"ファイルオープンエラー:\
          \ %v\", err)\n\t}\n\tdefer file.Close()\n\n\tpart, err := writer.CreateFormFile(\"data\", \"company_stamp.png\"\
          )\n\tif err != nil {\n\t\tlog.Fatalf(\"マルチパート作成エラー: %v\", err)\n\t}\n\tio.Copy(part, file)\n\twriter.Close()\n\n\
          \turl := \"https://api.test.fincode.jp/v1/company_stamps\"\n\treq, err := http.NewRequest(\"POST\", url, body)\n\
          \tif err != nil {\n\t\tlog.Fatalf(\"リクエスト作成エラー: %v\", err)\n\t}\n\treq.Header.Set(\"Authorization\", \"Bearer \"\
          +apiKey)\n\treq.Header.Set(\"Content-Type\", writer.FormDataContentType())\n\n\tresp, err := http.DefaultClient.Do(req)\n\
          \tif err != nil {\n\t\tlog.Fatalf(\"リクエスト送信エラー: %v\", err)\n\t}\n\tdefer resp.Body.Close()\n\n\trespBody, _ := io.ReadAll(resp.Body)\n\
          \tfmt.Println(string(respBody))\n}\n"
