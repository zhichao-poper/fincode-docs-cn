      description: 商户 ID
    scheduled_deposit_date:
      type: string
      nullable: false
      example: 2022/05/16 23:59
      description: '销售结算预计入账日期。

        格式：`yyyy/MM/dd HH:MM`'
    aggregate_term_start:
      type: string
      nullable: false
      example: 2022/05/16 23:59
      description: '销售结算统计期间的开始时间。

        格式：`yyyy/MM/dd HH:MM`'
    aggregate_term_end:
      type: string
      nullable: false
      example: 2022/05/16 23:59
      description: '销售结算统计期间的结束时间。

        格式：`yyyy/MM/dd HH:MM`'
    deposit_date:
      type: string
      nullable: true
      example: 2022/05/16 23:59
      description: '销售结算实际入账日期。

        格式：`yyyy/MM/dd HH:MM`'
    payment_deadline:
      type: string
      nullable: true
      example: null
      description: '产生应付款时的支付截止日期。

        格式：`yyyy/MM/dd HH:MM`'
    payment_completion_date:
      type: string
      nullable: true
      example: null
      description: '产生应付款时的请款日期。

        格式：`yyyy/MM/dd HH:MM`'
    count:
      type: integer
      nullable: false
      example: 3
      description: 当前销售结算中包含的结算明细数量。
    bank_transfer_fee:
      type: integer
      format: int64
      nullable: false
      example: 0
      description: 转账手续费
    Account_properties-total_amount:
      type: integer
      format: int64
      nullable: false
      example: 1000
      description: 当前销售结算所涵盖交易的总金额。
    fee_amount:
      type: integer
      format: int64
      nullable: false
      example: 30
      description: 当前销售结算所涵盖交易应向 fincode 支付的手续费。
    deposit_amount:
      type: integer
      format: int64
      nullable: false
      example: 568
      description: '销售结算的入账金额，即商户实际或预计收到的销售款。

        该金额等于结算金额（`settlement_amount`）减去银行转账手续费（`bank_transfer_fee`）。'
    platform_fee_amount:
      type: integer
      format: int64
      nullable: false
      example: 0
      description: '当前销售结算所涵盖交易的平台使用费。

        仅适用于租户商户。'
    platform_fee_tax_amount:
      type: integer
      format: int64
      nullable: false
      example: 0
      description: '当前销售结算所涵盖交易的平台使用费消费税。

        仅适用于租户商户。'
    AccountListItem:
      type: object
      properties:
        id:
          allOf:
