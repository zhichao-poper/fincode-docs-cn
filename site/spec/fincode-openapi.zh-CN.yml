      - lang: node
        label: Node.js
        source: "import fetch from \"node-fetch\";\n\nconst BASE_URL = \"https://api.test.fincode.jp\";\nconst API_KEY = \"\
          <Secret API Key>\";\n\n(async () => {\n  const invoiceId = \"<Invoice ID>\"; // ここにInvoice IDを設定\n\n  const endpoint\
          \ = `${BASE_URL}/v1/invoices/${invoiceId}`;\n\n  const response = await fetch(endpoint, {\n    method: \"PUT\",\n\
          \    headers: {\n      Authorization: `Bearer ${API_KEY}`,\n      \"Content-Type\": \"application/json\",\n    },\n\
          \    body: JSON.stringify({\n      is_uncollectible: false,\n      bill_mail_send_flag: \"0\",\n      receipt_mail_send_flag:\
          \ \"0\",\n      underpayment_mail_send_flag: \"0\",\n      invoice_number: \"INV123456\",\n      customer_id: \"\
