                客户账单地址的国家/地区代码。

                格式：ISO 3166-1 numeric


                未填写时，自动使用客户的 `addr_country`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。'
            tds2_bill_addr_line_1:
              type: string
              minLength: 1
              maxLength: 50
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户账单地址的第 1 行，请填写街道、门牌号或区块信息，也可以包含都道府县及市区信息。


                如果现有地址无法按字段拆分，请在长度限制内分配到 `tds2_bill_addr_line_1`～`tds2_bill_addr_line_3`；也可以将完整地址全部填写在本字段，并将第 2、3 行留空。


                未填写时，自动使用客户的 `addr_line_1`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。'
            tds2_bill_addr_line_2:
              type: string
              minLength: 1
              maxLength: 50
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户账单地址的第 2 行，请填写建筑物名称、房间号等信息。


                未填写时，自动使用客户的 `addr_line_2`。'
            tds2_bill_addr_line_3:
              type: string
              minLength: 1
              maxLength: 50
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户账单地址的第 3 行，请填写其他地址信息。


                未填写时，自动使用客户的 `addr_line_3`。'
            tds2_bill_addr_post_code:
              type: string
              minLength: 1
              maxLength: 16
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户账单地址的邮政编码。


                未填写时，自动使用客户的 `addr_post_code`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。'
            tds2_bill_addr_state:
              type: string
              minLength: 1
              maxLength: 3
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户账单地址的州或都道府县代码。

                参考：[日本国土交通省都道府县代码](https://nlftp.mlit.go.jp/ksj/gml/codelist/PrefCd.html)


                未填写时，自动使用客户的 `addr_state`。如果商户侧保存了客户地址信息，则必须填写；未保存时可不填写。'
            tds2_email:
              type: string
              minLength: 1
              maxLength: 254
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户的电子邮箱地址。未填写时，自动使用客户的 `email`。


                自 2024 年 8 月 12 日起，以下字段必须至少填写一项：


                - 客户家庭电话号码（`tds2_home_phone_no`）

                - 客户手机号码（`tds2_mobile_phone_no`）

                - 客户工作单位电话号码（`tds2_work_phone_no`）

                - 客户电子邮箱地址（`tds2_email`）


                目前即使未传递这些信息仍会执行认证，但未来可能不再支持。'
            tds2_home_phone_cc:
              type: string
              minLength: 1
              maxLength: 3
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户家庭电话号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_home_phone_no`。


                未填写时，自动使用客户的 `phone_cc`。'
            tds2_home_phone_no:
              type: string
              minLength: 1
              maxLength: 15
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户家庭电话号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_home_phone_cc`。


                未填写时，自动使用客户的 `phone_no`。自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email`
                必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。'
            tds2_mobile_phone_cc:
              type: string
              minLength: 1
              maxLength: 3
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户手机号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_mobile_phone_no`。'
            tds2_mobile_phone_no:
              type: string
              minLength: 1
              maxLength: 15
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户手机号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_mobile_phone_cc`。


                自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email` 必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。'
            tds2_work_phone_cc:
              type: string
              minLength: 1
              maxLength: 3
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户工作单位电话号码的国家/地区代码，不包含 `+`。填写本字段时，必须同时填写 `tds2_work_phone_no`。'
            tds2_work_phone_no:
              type: string
              minLength: 1
              maxLength: 15
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户工作单位电话号码，仅限不含连字符的半角数字。填写本字段时，必须同时填写 `tds2_work_phone_cc`。


                自 2024 年 8 月 12 日起，`tds2_home_phone_no`、`tds2_mobile_phone_no`、`tds2_work_phone_no`、`tds2_email` 必须至少填写一项。目前即使未传递这些信息仍会执行认证，但未来可能不再支持。'
            tds2_ship_addr_city:
              type: string
              minLength: 1
              maxLength: 50
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户收货地址的城市名称。'
            tds2_ship_addr_country:
              type: string
              minLength: 1
              maxLength: 3
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户收货地址的国家/地区代码。

                格式：ISO 3166-1 numeric'
            tds2_ship_addr_line_1:
              type: string
              minLength: 1
              maxLength: 50
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户收货地址的第 1 行。'
            tds2_ship_addr_line_2:
              type: string
              minLength: 1
              maxLength: 50
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户收货地址的第 2 行。'
            tds2_ship_addr_line_3:
              type: string
              minLength: 1
              maxLength: 50
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户收货地址的第 3 行。'
            tds2_ship_addr_post_code:
              type: string
              minLength: 1
              maxLength: 16
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户收货地址的邮政编码。'
            tds2_ship_addr_state:
              type: string
              minLength: 1
              maxLength: 3
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                客户收货地址的州或都道府县代码。

                参考：[日本国土交通省都道府县代码](https://nlftp.mlit.go.jp/ksj/gml/codelist/PrefCd.html)'
            tds2_delivery_email_address:
              type: string
              minLength: 1
              maxLength: 254
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                商品交付联系邮箱。'
            tds2_delivery_timeframe:
              type: string
              minLength: 2
              maxLength: 2
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                商品交付时间范围。


                - `01`：电子交付

                - `02`：当日发货

                - `03`：次日发货

                - `04`：第 2 天及以后发货'
            tds2_gift_card_amount:
              type: string
              minLength: 1
              maxLength: 15
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                仅限购买预付卡或礼品卡时使用。填写预付卡或礼品卡的购买总金额。'
            tds2_gift_card_count:
              type: string
              minLength: 2
              maxLength: 2
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                仅限购买预付卡或礼品卡时使用。填写已购买的预付卡或礼品卡总数量。'
            tds2_gift_card_curr:
              type: string
              minLength: 3
              maxLength: 3
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                仅限购买预付卡或礼品卡时使用。填写预付卡或礼品卡的货币代码。

                格式：ISO 4217 numeric


                不可使用以下货币代码（债券市场单位等）：`955`、`956`、`957`、`958`、`959`、`960`、`961`、`962`、`963`、`964`、`999`。'
            tds2_pre_order_date:
              type: string
              minLength: 8
              maxLength: 8
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                商品预计发售日期。

                格式：`YYYYMMDD`'
            tds2_pre_order_purchase_ind:
              type: string
              minLength: 2
              maxLength: 2
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                商品销售状态。


                - `01`：已发售商品

                - `02`：预售商品'
            tds2_reorder_items_ind:
              type: string
              minLength: 2
              maxLength: 2
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                表示本次商品订单是首次购买还是重复购买。


                - `01`：首次购买

                - `02`：重复购买'
            tds2_ship_ind:
              type: string
              minLength: 2
              maxLength: 2
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                交易商品的配送方式。


                - `01`：配送至持卡客户的账单地址

                - `02`：配送至商户保存的其他已验证地址

                - `03`：配送至与持卡客户账单地址不同的地址

                - `04`：配送至门店或到附近门店自提（门店地址通过收货地址指定）

                - `05`：数字商品（包括在线服务、电子礼品卡及兑换码）

                - `06`：无需配送（旅行及活动门票）

                - `07`：其他（游戏、无需配送的数字服务、电子媒体订阅费等）'
            tds2_recurring_expiry:
              type: string
              minLength: 8
              maxLength: 8
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                仅限订阅等持续扣款业务使用。填写持续扣款的结束日期。

                格式：`YYYYMMDD`'
            tds2_recurring_frequency:
              type: string
              minLength: 1
              maxLength: 4
              description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

                仅限订阅等持续扣款业务使用。填写持续扣款的最短扣款间隔天数。'
        virtual_account:
          type: object
          description: 银行转账（虚拟账户）信息
          properties:
            reference_invoice_id:
              type: string
              minLength: 1
              maxLength: 30
              description: '用于复用虚拟账户的账单 ID。


                如需复用另一账单持有的虚拟账户，请填写该账单 ID。被引用的账单必须处于 `PAID` 状态，且转为 `PAID` 后未超过 90 天。'
            use_exact_deposit_amount:
              type: boolean
              enum:
              - true
              - false
              description: '可入账金额限制标志。

                表示是否为本次支付使用的虚拟账户设置可入账金额。启用后，购买者只能转入应付金额。


                - `true`：设置可入账金额

                - `false`：不设置可入账金额（默认）'
        directdebit:
          type: object
          description: 银行账户自动扣款信息
          properties:
            payment_method_id:
              allOf:
              - $ref: '#/components/schemas/properties-payment_method_id'
            target_date:
              allOf:
              - $ref: '#/components/schemas/properties-target_date'
            remarks:
              allOf:
              - $ref: '#/components/schemas/properties-remarks'
            directdebit_failure_mail_send_flag:
              allOf:
              - $ref: '#/components/schemas/directdebit_failure_mail_send_flag'
        client_field_1:
          type: string
          minLength: 1
          maxLength: 100
          description: 商户自定义字段 1
        client_field_2:
          type: string
          minLength: 1
          maxLength: 100
          description: 商户自定义字段 2
        client_field_3:
          type: string
          minLength: 1
          maxLength: 100
          description: 商户自定义字段 3
    InvoiceDetail.Updating.Response:
      allOf:
      - $ref: '#/components/schemas/Invoice'
    InvoiceDetail.Deleting.Response:
      type: object
      properties:
        id:
          type: string
          description: 账单 ID
          minLength: 1
          maxLength: 30
        delete_flag:
          type: string
          description: '删除标志。


            - `1`：成功'
    InvoiceDetail.Opening.Request:
