components:
  securitySchemes:
    Secret-Bearer-Auth:
      type: http
      scheme: bearer
      description: "このAPIはシークレットキーによる認証を必要とします。\\\nBearer認証を用いる場合、リクエストヘッダー `Authorization`に下記の形式でシークレットキーを指定します。\n```\n \
        \ Authorization: Bearer␣{APIキー}\n```\nシークレットキーはfincodeの管理画面から取得できます。\n"
    Secret-Basic-Auth:
      type: http
      scheme: basic
      description: "このAPIはシークレットキーによる認証を必要とします。\\\nBasic認証を用いる場合、リクエストヘッダー `Authorization`に下記の形式でシークレットキーを指定します。\n``` JavaScript\n\
        \  Authorization: Basic␣{Base64でエンコードしたAPIキー}\n```\nシークレットキーはfincodeの管理画面から取得できます。\n"
    Public-Bearer-Auth:
      type: http
      scheme: bearer
      description: "このAPIはパブリックキーによる認証で利用できます。\\\nBearer認証を用いる場合、リクエストヘッダー `Authorization`に下記の形式でパブリックキーを指定します。\n```\n  Authorization:\
        \ Bearer␣{APIキー}\n```\nパブリックキーはfincodeの管理画面から取得できます。\n"
    Public-Basic-Auth:
      type: http
      scheme: basic
      description: "このAPIはパブリックキーによる認証を必要とします。\\\nBasic認証を用いる場合、リクエストヘッダー `Authorization`に下記の形式でパブリックキーを指定します。\n``` JavaScript\n\
        \  Authorization: Basic␣{Base64でエンコードしたAPIキー}\n```\nパブリックキーはfincodeの管理画面から取得できます。\n"
    Both-Bearer-Auth:
      type: http
      scheme: bearer
      description: "このAPIはシークレットキーまたはパブリックキーによる認証を必要とします。\\\nBearer認証を用いる場合、リクエストヘッダー `Authorization`に下記の形式でシークレットキーまたはパブリックキーを指定します。\n\
        ```\n  Authorization: Bearer␣{APIキー}\n```\nシークレットキーまたはパブリックキーはfincodeの管理画面から取得できます。\n"
    Both-Basic-Auth:
      type: http
      scheme: basic
      description: "このAPIはシークレットキーまたはパブリックキーによる認証を必要とします。\\\nBasic認証を用いる場合、リクエストヘッダー `Authorization`に下記の形式でシークレットキーまたはパブリックキーを指定します。\n\
        ``` JavaScript\n  Authorization: Basic␣{Base64でエンコードしたAPIキー}\n```\nシークレットキーまたはパブリックキーはfincodeの管理画面から取得できます。\n"
  schemas:
    Pagination.QueryParams:
      type: object
      properties:
        page:
          type: integer
          minLength: 1
          nullable: true
          description: 页码。
        limit:
          type: integer
          nullable: true
          minLength: 10
          maxLength: 100
          description: 单次获取的数据条数上限。
        count_only:
          type: boolean
          nullable: true
