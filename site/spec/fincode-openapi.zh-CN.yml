  /v1/secure2/{access_id}:
    put:
      operationId: executeThreeDSecureecureAuthentication
      security:
      - Secret-Bearer-Auth: []
      - Public-Bearer-Auth: []
      - Secret-Basic-Auth: []
      tags:
      - 3D Secure 认证
      summary: 执行 3D Secure 认证
      description: '开始对 `access_id` 指定的卡片支付交易执行 3D Secure 2.0 认证。


        当预先准备的 `tds2_ret_url` 通过 `event` 参数收到 `ThreeDSecureMethodFinished` 或 `ThreeDSecureMethodSkipped` 事件通知时，调用此 API。


        - 当响应中的 `tds2_trans_result` 为 `Y` 或 `A` 时，调用“执行认证后支付”API，完成已经过 3D Secure 认证的支付。

        - 当响应中的 `tds2_trans_result` 为 `C` 时，将购买者重定向至 `challenge_url` 完成挑战认证，然后调用“确认 3D Secure 认证结果”API 确认结果。

        - 当响应中的 `tds2_trans_result` 为上述值以外的值时，表示该支付被 3D Secure 认证拒绝。'
      parameters:
      - name: access_id
        in: path
        description: 交易 ID。
        schema:
          allOf:
          - $ref: '#/components/schemas/AccessId_schema'
        required: true
      - name: Tenant-Shop-Id
        in: header
        schema:
          allOf:
          - $ref: '#/components/schemas/schema'
        description: '<span class="smallText color--red-400">仅平台主商户可指定</span>

          租户商户 ID。

          对该租户商户的支付信息中由 `access_id` 指定的卡片支付开始执行 3D Secure 认证。'
        required: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreeDSecure.Authorizing.Request'
      responses:
        '200':
          description: 请求成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreeDSecure.Authorizing.Response'
        '400':
          description: 请求无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FincodeAPIError.Response'
      x-code-samples:
      - lang: curl
        label: cURL
        source: "curl \\\n    -X PUT \\\n    -H \"Authorization:Bearer <Secret API Key>\" \\\n    -H \"Content-Type: application/json\"\
          \ \\\n    -d '{\n    \"param\": \"valuereturnedfrom3dsprocess\"\n}' \\\n'https://api.test.fincode.jp/v1/secure2/{access_id}'\n"
      - lang: node
        label: Node.js
        source: "import { createFincode } from \"@fincode/node\";\n\nconst API_KEY = \"<Secret API Key>\";\n\n(async () =>\
          \ {\n    const fincode = createFincode({ apiKey: API_KEY, isLiveMode: false });\n\n    const accessId = \"<Access\
          \ ID>\";\n\n    try {\n        // リクエストの送信\n        const result = await fincode.payments.execute3DSecureAuth(accessId,\
          \ {\n            param: \"<Value you received in tds2_ret_url>\",\n        });\n    } catch (e) {\n        // エラーの処理\n\
          \    }\n})();\n"
      - lang: go
        label: Go
        source: "package main\n\nimport (\n\t\"bytes\"\n\t\"encoding/json\"\n\t\"fmt\"\n\t\"log\"\n\t\"net/http\"\n)\n\nfunc\
          \ main() {\n\n\tapiKey := \"<Secret API Key>\"\n\n\taccessID := \"<Access ID>\"\n\n\tbody := Executing3DSecureAuthRequest{\n\
          \t\tParam: \"<Value you received in tds2_ret_url>\",\n\t}\n\n\tmarshalledBody, _ := json.Marshal(body)\n\n\t// リクエストの作成\n\
          \treq, _ := http.NewRequest(\n\t\t\"PUT\",\n\t\tfmt.Sprintf(\"https://api.test.fincode.jp/v1/secure2/%s\", accessID),\n\
          \t\tbytes.NewBuffer(marshalledBody),\n\t)\n\treq.Header.Set(\"Authorization\", fmt.Sprintf(\"Bearer %s\", apiKey))\n\
          \treq.Header.Set(\"Content-Type\", \"application/json\")\n\n\t// リクエストの送信\n\tclient := &http.Client{}\n\tres, err\
          \ := client.Do(req)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\tdefer res.Body.Close()\n\n}\n\ntype Executing3DSecureAuthRequest\
          \ struct {\n\tParam string `json:\"param\"`\n}\n"
      - lang: php
        label: PHP
        source: "<?php\n\n$apiKey = '<Secret API Key>';\n\n$accessId = '<Access ID>';\n\n$baseUrl = \"https://api.test.fincode.jp\"\
          ;\n$endpoint = \"/v1/secure2/{$accessId}\";\n$headers = [\n    \"Authorization: Bearer \" . $apiKey,\n    \"Content-Type:\
          \ application/json\"\n];\n\n$data = json_encode([\n    \"param\" => \"<Value you received in tds2_ret_url>\"\n]);\n\
