      - lang: python
        label: Python 3
        source: "import requests\n\ndef main():\n    api_key = '<Secret API Key>'\n\n    tenant_shop_id = '<Tenant Shop ID>'\n\
          \n    file_path = '<Path to file>'\n    file_name = '<File Name>'\n\n    with open(file_path, 'rb') as file:\n \
          \       files = {'data': (file_name, file)}\n\n        # 追加情報（ファイル種別）の指定\n        payload = {'type': 'DRIVER_LICENSE_FRONT'}\n\
          \n        url = f'https://api.test.fincode.jp/v1/contracts/examinations/tenants/{tenant_shop_id}/files'\n\n    \
          \    # ヘッダーを設定\n        headers = {\n            'Authorization': f'Bearer {api_key}',\n            'Tenant-Shop-Id':\
          \ tenant_shop_id,\n        }\n\n        # HTTP POSTリクエストの送信\n        try:\n            response = requests.post(url,\
          \ headers=headers, files=files, data=payload)\n\n            # レスポンスの処理\n            if response.status_code ==\
          \ 200:\n                # 成功した場合の処理\n                print(f\"Success: {response.json()}\")\n            else:\n\
          \                # エラーの処理\n                print(f\"Error: {response.json()} {response.text}\")\n        except\
          \ requests.RequestException as e:\n            # 通信エラーの処理\n            print(f\"Request error: {e}\")\n\nif __name__\
          \ == '__main__':\n    main()\n"
      - lang: ruby
        label: Ruby
        source: "require 'net/http'\nrequire 'uri'\nrequire 'mime/types'\n\n\nAPI_KEY = '<Secret API Key>'\nBASE_URL = 'https://api.test.fincode.jp'\n\
          \ndef main\n    tenant_shop_id = '<Tenant Shop ID>'\n    endpoint = \"/v1/contracts/examinations/tenants/#{tenant_shop_id}/files\"\
          \n    uri = URI.parse(BASE_URL + endpoint)\n\n    http = Net::HTTP.new(uri.host, uri.port)\n    http.use_ssl = true\n\
          \n    file_path = '<Path to file>'\n    file_name = '<File Name>'\n    \n    file = File.open(file_path, 'rb')\n\
          \    file_data = file.read\n    file.close\n\n    # リクエストの作成\n    request = Net::HTTP::Post.new(uri.request_uri)\n\
          \    request['Authorization'] = \"Bearer #{API_KEY}\"\n    request['Tenant-Shop-Id'] = tenant_shop_id\n\n    # ファイルと追加情報をマルチパートフォームデータに追加\n\
          \    boundary = '----FincodeMultipartRequest'\n    body = []\n    insert_file_to_body(body, boundary, 'data', file_name,\
          \ file_data)\n    insert_data_to_body(body, boundary, 'type', \"DRIVER_LICENSE_FRONT\")\n    body << \"--#{boundary}--\\\
          r\\n\"\n\n    request['Content-Type'] = \"multipart/form-data; boundary=#{boundary}\"\n    request.body = body.join('')\n\
          \n    # リクエストの送信\n    response = http.request(request)\n\n    case response\n    when Net::HTTPSuccess\n       \
          \ puts 'SUCCESS'\n    else\n        puts 'ERROR'\n    end\n\n    # レスポンスの表示\n    puts response.body\nend\n\ndef\
          \ insert_file_to_body(body, boundary, key, file_name, file_data)\n    body << \"--#{boundary}\\r\\n\"\n    body\
          \ << \"Content-Disposition: form-data; name=\\\"#{key}\\\"; filename=\\\"#{file_name}\\\"\\r\\n\"\n    body << \"\
          Content-Type: #{MIME::Types.type_for(file_name).first.content_type}\\r\\n\"\n    body << \"\\r\\n\"\n    body <<\
          \ file_data\n    body << \"\\r\\n\"\nend\n\ndef insert_data_to_body(body, boundary, key, value)\n    body << \"\
          --#{boundary}\\r\\n\"\n    body << \"Content-Disposition: form-data; name=\\\"#{key}\\\"\\r\\n\"\n    body << \"\
          \\r\\n\"\n    body << value\n    body << \"\\r\\n\"\nend\n\nmain\n"
