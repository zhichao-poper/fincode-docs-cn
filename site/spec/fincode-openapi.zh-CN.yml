    | 銀行振込（バーチャル口座）      | 支払通知（シミュレート）     | payments.virtualaccount.complete.stub  |

    | 決済手段（※3）                     | 登録                        | customers.payment_methods.created      |

    | 決済手段（※2）                     | 更新                        | customers.payment_methods.updated      |

    | 決済手段（※3）                     | 停止                        | customers.payment_methods.inactivated  |

