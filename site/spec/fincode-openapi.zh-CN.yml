      - JCB/AMEX
      - DINERS
      - APPLE PAY UC
      - APPLE PAY JCB/AMEX
      - GOOGLE PAY UC
      - GOOGLE PAY TFC
      - GOOGLE PAY ORICO
      - GOOGLE PAY JCB
      - PAYSLE
      - PAYPAY
      - DIRECT DEBIT
      - DIRECT DEBIT MIZUHO
      - VIRTUAL ACCOUNT
      - VIRTUAL ACCOUNT BULK
      description: '審査対象


        - `UC`: VISA／Mastercard（UCカード）

        - `TFC`: VISA／Mastercard（トヨタファイナンス）

        - `ORICO`: VISA／Mastercard（オリエントコーポレーション）

        - `JCB/AMEX`: JCB／AMEX（JCB）

        - `DINERS`: DINERS（JCB）

        - `APPLE PAY UC`: Apple Pay（UCカード）

        - `APPLE PAY JCB/AMEX`: Apple Pay（JCB）

        - `GOOGLE PAY UC`: Google Pay（UCカード）

        - `GOOGLE PAY TFC`: Google Pay（トヨタファイナンス）

        - `GOOGLE PAY ORICO`: Google Pay（オリエントコーポレーション）

        - `GOOGLE PAY JCB`: Google Pay（JCB）

        - `PAYSLE`: コンビニ決済（電算システム）

