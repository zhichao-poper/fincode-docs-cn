            当 `use_of_fincode.used_on_web` 或 `site_published` 为 `false`，且 `provides.digital_contents` 为 `true` 时必填。'
        additional_info:
          type: object
          nullable: true
          description: '补充提交信息。开始审核时，如果商户网站尚未公开，即 `use_of_fincode.used_on_web` 或 `site_published` 为 `false`，需要补充提供本信息。

            请根据日本《特定商业交易法》要求展示的信息填写。'
          properties:
            shop_sales_manager_name:
              type: string
              nullable: true
              minLength: 1
              maxLength: 300
              example: イプシロン太郎
              description: 商户销售负责人的姓名。
            shop_service_name:
