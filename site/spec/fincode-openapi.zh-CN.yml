        tds2_ship_addr_country:
          type: string
          example: '392'
          minLength: 1
          maxLength: 3
          nullable: true
          description: '<span class="smallText color--blue-400">[3D Secure 认证参数]</span>

            客户收货地址的国家/地区代码。

            格式：ISO 3166-1 numeric'
        tds2_ship_addr_state:
          type: string
          example: '13'
          minLength: 1
          maxLength: 3
          nullable: true
