          \ + endpoint)\n    uri.query = URI.encode_www_form(query_params)\n    http = Net::HTTP.new(uri.host, uri.port)\n\
          \    http.use_ssl = true\n\n    file_path = '<Path to file>'\n    file_name = '<File Name>'\n    \n    file = File.open(file_path,\
