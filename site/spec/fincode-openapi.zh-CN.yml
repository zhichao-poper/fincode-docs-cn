    PaymentStatus:
      type: string
      enum:
      - UNPROCESSED
      - CHECKED
      - AUTHORIZED
      - AWAITING_CUSTOMER_PAYMENT
      - AWAITING_PAYMENT_APPROVAL
      - CAPTURED
      - CANCELED
      - EXPIRED
      - AUTHENTICATED
      - FAILED
      example: CAPTURED
      description: '支付状态。


        - `UNPROCESSED`：未处理

        - `CHECKED`：有效性检查完成

        - `AUTHORIZED`：已授权

        - `AWAITING_CUSTOMER_PAYMENT`：等待购买者支付

        - `AWAITING_PAYMENT_APPROVAL`：等待支付批准

        - `CAPTURED`：已确认请款

        - `CANCELED`：已取消

        - `EXPIRED`：已过期

        - `AUTHENTICATED`：未处理，等待 3D Secure 认证

        - `FAILED`：支付失败'
      x-description-card: '支付状态。


        - `UNPROCESSED`：未处理<br /><span class="smallText">尚未执行收款。</span>

        - `CHECKED`：有效性检查完成<br /><span class="smallText">卡片有效性检查已经完成。</span>

        - `AUTHORIZED`：预授权<br /><span class="smallText">已占用信用额度，可通过确认销售额完成收款。</span>

        - `CAPTURED`：销售额已确认<br /><span class="smallText">收款已完成，销售额已经确认。</span>

        - `CANCELED`：已取消<br /><span class="smallText">本次支付已取消。</span>

        - `AUTHENTICATED`：未处理（等待 3D Secure 认证）<br /><span class="smallText">刚执行需要 3D Secure 认证的支付时处于此状态。在执行认证后支付前不会收款或进行预授权。</span>'
      x-description-konbini: '決済ステータス


