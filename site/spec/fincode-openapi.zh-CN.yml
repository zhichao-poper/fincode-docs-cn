        - `3`：因购买者原因而失败

        - `4`：因扣款申请书未送达或内容有误而失败<br /><span class="smallText">金融机构尚未登记银行账户自动扣款申请书时会出现此结果。</span>

        - `7`：因数据错误而失败<br /><span class="smallText">仅适用于每月 1、5、20、26 日扣款的服务。</span><br /><span class="smallText">通常不会出现。如需调查，请联系
