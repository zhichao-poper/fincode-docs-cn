          type: string
          nullable: false
          example: lk_**********************
          minLength: 25
          maxLength: 25
          description: 重定向式支付链接 ID。
        link_url:
          type: string
          nullable: false
          maxLength: 100
          example: https://secure.test.fincode.jp/v1/links/lk_**********************
          description: 重定向式支付链接 URL。
        success_url:
          type: string
          nullable: true
          maxLength: 256
          example: https://your-service.example.com/success
          description: 在 `link_url` 中支付成功后，fincode 通过 POST 方法重定向到的 URL。
        cancel_url:
          type: string
          nullable: true
          maxLength: 256
          example: https://your-service.example.com/cancel
          description: 在 `link_url` 中取消支付后，fincode 通过 POST 方法重定向到的 URL。
        status:
          allOf:
