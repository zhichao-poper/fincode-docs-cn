              example: false
              description: 是否提供服务类商品。
            digital_contents:
              type: boolean
              nullable: true
              example: true
              description: 是否销售数字内容。
        content_description:
          type: string
          nullable: true
          minLength: 1
          maxLength: 5000
          example: '本サービスは、ユーザーが自由にWeb記事を投稿・販売できるコンテンツを提供しています。

            '
          description: 商户所提供商品或服务的说明。
        product_content_info:
          allOf:
          - $ref: '#/components/schemas/ContentInfo.V2'
          description: '实物商品信息。网站尚未公开时，需要提供经营商品的详细信息。

            当 `use_of_fincode.used_on_web` 或 `site_published` 为 `false`，且 `provides.product` 为 `true` 时必填。'
        service_content_info:
          allOf:
          - $ref: '#/components/schemas/ContentInfo.V2'
          description: '服务类商品信息。网站尚未公开时，需要提供经营服务的详细信息。

            当 `use_of_fincode.used_on_web` 或 `site_published` 为 `false`，且 `provides.service` 为 `true` 时必填。'
        digital_content_info:
