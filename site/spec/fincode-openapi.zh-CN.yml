              items:
                allOf:
                - $ref: '#/components/schemas/PaymentSessionPayType'
              description: '当前支付链接允许使用的支付方式，可指定多个。


                - `Card`：银行卡支付

                - `Konbini`：便利店支付

                - `Paypay`：PayPay

