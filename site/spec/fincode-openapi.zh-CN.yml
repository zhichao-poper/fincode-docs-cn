          \          unit_price: 1000,\n          quantity: 2,\n          tax_rate: 10,\n        },\n      ],\n      pay_types:\
          \ [\"Virtualaccount\", \"Card\"],\n    }),\n  });\n\n  if (response.ok) {\n    const invoiceData = await response.json();\n\
          \    console.log(\"Invoice Updated:\", invoiceData);\n  } else {\n    console.error(\"Error updating invoice:\"\
          , await response.text());\n  }\n})();\n"
      - lang: go
