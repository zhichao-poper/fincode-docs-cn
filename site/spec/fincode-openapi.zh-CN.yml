      - $ref: '#/components/schemas/Invoice'
    InvoiceDetail.Marking.Response:
      allOf:
      - $ref: '#/components/schemas/Invoice'
    InvoiceDetail.Refresh.Response:
      allOf:
      - $ref: '#/components/schemas/Invoice'
    DepositStatusCode:
      type: integer
      enum:
      - 3001
      - 3002
      - 3003
      - 3004
      - 3005
      - 3006
      - 3007
      - 3008
      - 3009
      - 3010
      - 3011
      - 3012
      - 3013
      description: '入账状态。


        - `3001`：金额确定前，仍在汇总且尚未入账

        - `3002`：金额已确定但尚未入账

        - `3003`：已入账

        - `3004`：入账暂停中，问题解决后 fincode 将尽快重试

        - `3005`：入账错误，问题解决后 fincode 将尽快重试

        - `3006`：请款中，取消金额超过销售金额，需要商户付款

        - `3007`：请款错误

        - `3008`：请款暂停中

        - `3009`：已确认商户支付请款金额

        - `3010`：因身份验证资料未确认而暂停入账

        - `3011`：销售额为 0 日元并已完成结算

        - `3012`：首次入账尚未执行

        - `3013`：与 fincode 的合同未成立'
    Account.ListRetrieving.QueryParams:
      type: object
      properties:
        processed:
          type: string
          nullable: true
          example: 2022/05
          description: '按确定日期（入账周期截止日期）的月份筛选。

            格式：`yyyy/MM`'
        status:
          $ref: '#/components/schemas/DepositStatusCode'
          nullable: true
          description: '入账状态，可使用半角逗号分隔指定多个值（OR 查询）。


            - `3001`：金额确定前

            - `3002`：金额已确定

            - `3003`：已入账

            - `3004`：入账暂停中

            - `3005`：入账错误

            - `3006`：请款中

            - `3007`：请款错误

            - `3008`：请款暂停中

            - `3009`：已支付

            - `3010`：身份验证资料未确认

            - `3011`：已结算

            - `3012`：开始入账前

            - `3013`：合同未成立'
        scheduled_from:
          type: string
          format: date
          nullable: true
          example: 2022/05/01
          description: '预计入账日期范围的起始日期。

            格式：`yyyy/MM/dd`'
        scheduled_to:
          type: string
          format: date
          nullable: true
          example: 2022/05/31
          description: '预计入账日期范围的结束日期。

            格式：`yyyy/MM/dd`'
    Account_properties-id:
      type: string
      minLength: 32
      maxLength: 32
      example: sales_s_***********_******_*****
      description: 销售款入账 ID
    account_id:
      type: integer
      minLength: 7
      maxLength: 7
      example: 1234567
      description: 结算 ID
    shop_id:
      type: string
      minLength: 13
      maxLength: 13
