    AccountDetailTradeType:
      type: integer
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      example: 1
      description: '取引種別\

        値によって、集計の際にこの売上入金明細の利用金額が加算されるか減算されるかが異なります。


        - `1`: 決済（加算）<br /><span class="smallText">この売上入金明細はある決済1件に対し発生したものであることを示します。</span>

        - `2`: 返金（減算）<br /><span class="smallText">この売上入金明細はある決済に対し発生したキャンセル1件に対し発生したものであることを示します。</span>

        - `3`: チャージバック（減算）<br /><span class="smallText">この売上入金明細はある決済に対し発生したチャージバック1件に対し発生したものであることを示します。</span>

        - `4`: 調整（加算）<br /><span class="smallText">この売上入金明細は何らかの理由で売上入金情報を調整するために発生したものであることを示します。減算のためマイナス値が返されることもあります。</span>

        - `5`: チャージバックの取消（加算）<br /><span class="smallText">この売上入金明細はある決済に対し発生したチャージバック1件が取り消されたとき発生したものであることを示します。</span>

        - `6`: 口座振替失敗時の手数料（減算）<br /><span class="smallText">この売上入金明細はある口座振替が失敗し、その決済手数料により発生したものであることを示します。</span>

        - `7`: 口座振替 振替用口座Web登録手数料（減算）<br /><span class="smallText">この売上入金明細は振替用口座のWeb登録に成功し、登録に係る手数料により発生したものであることを示します。</span>

        - `8`: 口座振替 振替用口座依頼書登録手数料（減算）<br /><span class="smallText">この売上入金明細は振替用口座の依頼書登録に成功し、登録に係る手数料により発生したものであることを示します。</span>

        - `10`: バーチャル口座 入金可能額設定手数料（減算）<br /><span class="smallText">この売上入金明細はバーチャル口座の入金可能額設定に成功し、設定に係る手数料により発生したものであることを示します。</span>

        - `11`: バーチャル口座 顧客型固定バーチャル口座登録手数料（減算）<br /><span class="smallText">この売上入金明細は顧客型固定バーチャル口座の登録に成功し、登録に係る手数料により発生したものであることを示します。</span>

        - `12`: バーチャル口座 一括決済未使用手数料（減算）<br /><span class="smallText">この売上入金明細はバーチャル口座の一括決済機能において、実際には使用されなかった口座に対して発生した手数料であることを示します。</span>

        '
