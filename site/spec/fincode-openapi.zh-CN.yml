          type: string
          description: '申诉内容，可使用半角逗号分隔指定多个值。


            - `1`：暂缓配送

            - `2`：停止配送

            - `11`：不记得使用过

            - `12`：未提供服务

            - `13`：未履行服务

            - `14`：未收到商品

            - `15`：商品不符

            - `16`：金额不符

            - `17`：商品存在瑕疵

            - `18`：遗漏取消

            - `19`：确认解约方法

            - `20`：希望代为解约

            - `21`：确认咨询窗口

            - `22`：确认交易内容'
        status_code:
          type: string
          description: '拒付状态，可使用半角逗号分隔指定多个值。


            - `4005`：需要处理

            - `4006`、`4007`、`4011`：已答复

            - `4009`：已结算'
