      description: '決済方法\

        このリダイレクト型決済で利用できる決済方法です。\

        \

        - `Card`：カード決済\

        - `Konbini`：コンビニ決済\

        - `Paypay`：PayPay

        - `Virtualaccount`：バーチャル口座決済

        '
    pay_type:
      type: array
      nullable: false
      items:
        allOf:
