components:
  securitySchemes:
    Secret-Bearer-Auth:
      type: http
      scheme: bearer
      description: '此 API 需要使用 Secret Key 认证。Bearer 认证时，请在请求头中按以下格式指定从 fincode 管理后台取得的 Secret Key：


        ```text

        Authorization: Bearer␣{API Key}

        ```'
    Secret-Basic-Auth:
      type: http
      scheme: basic
      description: '此 API 需要使用 Secret Key 认证。Basic 认证时，请在请求头中按以下格式指定经过 Base64 编码的 Secret Key：


        ```text

        Authorization: Basic␣{Base64 编码后的 API Key}

        ```'
    Public-Bearer-Auth:
      type: http
      scheme: bearer
      description: '此 API 可以使用 Public Key 认证。Bearer 认证时，请在请求头中按以下格式指定从 fincode 管理后台取得的 Public Key：


        ```text

        Authorization: Bearer␣{API Key}

        ```'
    Public-Basic-Auth:
      type: http
      scheme: basic
      description: '此 API 需要使用 Public Key 认证。Basic 认证时，请在请求头中按以下格式指定经过 Base64 编码的 Public Key：


        ```text

        Authorization: Basic␣{Base64 编码后的 API Key}

        ```'
    Both-Bearer-Auth:
      type: http
      scheme: bearer
      description: '此 API 需要使用 Secret Key 或 Public Key 认证。Bearer 认证时，请在请求头中按以下格式指定从 fincode 管理后台取得的任一 API Key：


        ```text

        Authorization: Bearer␣{API Key}

        ```'
    Both-Basic-Auth:
      type: http
      scheme: basic
      description: '此 API 需要使用 Secret Key 或 Public Key 认证。Basic 认证时，请在请求头中按以下格式指定经过 Base64 编码的任一 API Key：


        ```text

        Authorization: Basic␣{Base64 编码后的 API Key}

        ```'
  schemas:
    Pagination.QueryParams:
      type: object
      properties:
        page:
          type: integer
          minLength: 1
          nullable: true
          description: 页码。
        limit:
          type: integer
          nullable: true
          minLength: 10
          maxLength: 100
          description: 单次获取的数据条数上限。
        count_only:
          type: boolean
          nullable: true
          description: '是否仅获取总条数。

            指定为 `true` 时，只获取查询结果的总条数（`total_count`）。'
      x-common-properties:
        sort:
          type: string
          example: updated␣desc,created␣asc
    sort:
      type: string
      example: updated␣desc,created␣asc
    Customer.ListRetrieving.QueryParams:
      type: object
      properties:
        id:
          type: string
          nullable: true
          minLength: 1
          maxLength: 60
          example: c_**********************
          description: 客户 ID
        name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 384
          example: Jane Doe
          description: 客户名称
        email:
          type: string
          nullable: true
          minLength: 1
          maxLength: 254
          example: jane@example.com
          description: 客户电子邮箱地址。
        created_from:
          type: string
          nullable: true
          example: 2022/05/16
          description: '创建日期范围的起始日期；仅返回不早于该日期创建的客户。

            格式：`yyyy/MM/dd`'
        created_to:
          type: string
          nullable: true
          example: 2022/05/16
          description: '创建日期范围的结束日期；仅返回不晚于该日期创建的客户。

            格式：`yyyy/MM/dd`'
        sort:
          allOf:
          - $ref: '#/components/schemas/sort'
          nullable: true
          description: '指定排序字段和顺序。

            示例：`?sort=updated␣desc,created␣asc`


            可排序字段：`id`、`name`、`email`、`created`、`updated`。'
    schema:
      type: string
      example: s_***********
    _ListResponse:
      type: object
      properties:
        total_count:
          type: integer
          example: 100
          description: 总条数。
        last_page:
          type: integer
          example: 20
          description: 最后一页的页码。
        current_page:
          type: integer
          example: 3
          description: 当前页码。
        limit:
          type: integer
          example: 5
          description: 每页最大条数。
        link_next:
          type: string
          example: /v1/{resource}?limit=5&page=4
          nullable: true
          description: 用于获取下一页内容的 URL。
        link_previous:
          type: string
          example: /v1/{resource}?limit=5&page=2
          nullable: true
          description: 用于获取上一页内容的 URL。
    created:
      type: string
      example: 2022/05/16 23:59:59.999
      description: '创建时间。

        格式：`yyyy/MM/dd HH:mm:ss.SSS`'
    updated:
      type: string
      nullable: true
      example: 2022/05/16 23:59:59.999
      description: '更新时间。

        格式：`yyyy/MM/dd HH:mm:ss.SSS`'
    Customer:
      type: object
      properties:
        id:
          type: string
          example: c_**********************
          minLength: 1
          maxLength: 60
          description: 客户 ID
        name:
          type: string
          minLength: 1
