        expire:
          type: string
          nullable: false
          example: 2022/02/31 23:59:59.999
          description: '重定向式支付链接的有效期。

            格式：`yyyy/MM/dd HH:mm:ss.SSS`'
        shop_service_name:
          type: string
          nullable: true
          maxLength: 100
