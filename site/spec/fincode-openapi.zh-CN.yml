openapi: 3.0.2
info:
  title: fincode API 中文参考
  description: '这是 fincode 的 API 参考文档。

    fincode 除支付信息外还能够管理多种资源，因此其 API 采用面向资源的 REST 接口设计。

    调用 API 时必须使用 API Key 进行认证。发送请求时，请在 `Authorization` 请求头中设置有效的 API Key。'
  version: 1.4.0
  x-translation:
    language: zh-CN
    method: manual
    source: https://docs.fincode.jp/assets/api/fincode-openapi.yml
    disclaimer: 中文仅供开发参考；如有歧义，以 fincode 官方日文文档为准。
servers:
- url: https://api.fincode.jp
  description: 生产环境
- url: https://api.test.fincode.jp
  description: 测试环境
tags:
- name: 字符编码
  description: 'fincode 的请求与响应统一使用 UTF-8 字符编码。


    | 字符编码 | 备注 |

    | --- | --- |

    | UTF-8 | fincode 的请求与响应统一使用 UTF-8 字符编码。 |'
  x-trailTag: true
- name: 请求头
  description: '调用 fincode API 时可指定以下请求头。


    | 请求头 | 指定方式 | 说明 |

    | --- | --- | --- |

    | `Api-Version` | YYYYMMDD | 可指定 API 的次要版本（当前为 `20211001`）。未指定时自动使用最新版本。 |

    | `Authorization` | Bearer {{API Key}} <br />或 Basic {{Base64 编码后的 API Key}} | 指定 API Key。支持 Bearer 认证或 Basic 认证。 |

    | `Content-Type` | application/json;charset=UTF-8 | 指定请求体的 Content-Type。 |

    | `idempotent_key` | UUID v4 | 用于保证请求幂等性的键。详情参见“幂等处理”。 |

    | `Tenant-Shop-Id` | 租户商户的商户 ID | 仅限平台功能。平台商户以租户商户身份执行 API（例如处理该租户商户的支付）时，指定对应租户的商户 ID。 |'
- name: 分页
  description: '为避免一次返回大量数据，列表查询类 API 实现了分页功能。

    当目标数据达到 10 条或以上时，默认最多返回 10 条。

    如需获取后续数据或一次获取 10 条以上的数据，可通过查询参数指定 `page` 和 `limit`。

    还可以使用查询条件缩小数据范围；可用的查询字段因 API 而异。


    | No | 项目 | 参数 | 含义 | 默认值 | 范围 | 处理规则 |

    |----|------|------|------|--------|------|----------|

    | 1 | 获取条数 | limit | 每页最大条数 | 10 | 10-100 | 未指定时使用默认值。超出范围时返回错误。 |

    | 2 | 页码 | page | 页码 | 1 | 1-9999 | 未指定时使用默认值。指定的数字大于响应中的 `last_page`（最后一页）时返回错误。 |

    | 3 | 仅总数标志 | count_only | 仅获取总条数 | false | - | 指定为 true 时，响应只返回符合条件的记录总数。 |

    | 4 | 排序 | sort | 定义排序顺序 | 各 API 的默认值 | - | 格式为 `sort=字段1 [asc \| desc], 字段2 [asc \| desc], …`。例如：`sort=customer_id asc,
    customer_name asc, customer_email desc`。未指定时使用各 API 的默认排序。字段不存在或格式错误时返回错误。`count_only` 为 true 时忽略此参数。 |


    ### 示例 1


    使用[客户列表查询 API](https://docs.fincode.jp/api#tag/%E9%A1%A7%E5%AE%A2/operation/retrieveCustomerList)，按客户 ID 升序获取第 2 页数据：


    ```txt

    https://api.test.fincode.jp/v1/customers?page=2&sort=id asc

    ```


    ### 示例 2


    使用[客户列表查询 API](https://docs.fincode.jp/api#tag/%E9%A1%A7%E5%AE%A2/operation/retrieveCustomerList)，通过查询条件将创建日期限定为 2023/06/28，并获取第
    2 页数据：


    ```txt

    https://api.test.fincode.jp/v1/customers?page=2&created_from=2023/06/28&created_to=2023/06/28

    ```


    ### 示例 3


    使用[客户列表查询 API](https://docs.fincode.jp/api#tag/%E9%A1%A7%E5%AE%A2/operation/retrieveCustomerList)，仅获取客户总数：


    ```txt

    https://api.test.fincode.jp/v1/customers?count_only=true

    ```'
- name: 幂等处理
  description: '商户可以在 API 请求头 `idempotent_key` 中设置任意的幂等键，以唯一标识一次请求；此后使用相同幂等键发送请求时，将返回与首次请求相同的结果。

    使用此功能可以避免因重复请求而误创建相同资源。


    请使用 UUID v4 格式，并确保每次新请求使用唯一值。

    幂等键的有效期为 30 分钟。


    ### 示例


    ```txt

    idempotent_key: 1003d6af-9e68-4f4e-a916-663e29db5377

    ```'
- name: 错误对象
  description: "发生 HTTP `4xx` 或 `5xx` 错误时，API 会返回统一格式的错误对象。\n`error_message` 表示错误原因，请根据其内容修正请求。\n注意：`error_message` 可能在不事先通知的情况下变更，仅用于协助开发阶段排查问题。\n\
    \n详细信息也可参阅 [Docs 错误码一览](https://docs.fincode.jp/develop_support/error)。\n\n### 示例\n\n错误对象以数组形式放在响应的 `errors` 字段中。\n\n\
    ```json\n{\n    \"errors\": [\n        {\n            \"error_code\": \"E123456789\",\n            \"error_message\":\
    \ \"错误内容 1\"\n        },\n        {\n            \"error_code\": \"E012345678\",\n            \"error_message\": \"错误内容\
    \ 2\"\n        }\n    ]\n}\n```\n\n| 参数 | | 说明 |\n| --- | --- | --- |\n| errors | | 错误对象数组。 |\n| | error_code | 错误码。程序需要判断错误类型时，建议使用此字段。详情参阅\
    \ [Docs > 错误码一览](https://docs.fincode.jp/develop_support/error)。 |\n| | error_message | 错误消息，用于说明错误内容。此值可能在不事先通知的情况下变更。\
    \ |"
- name: 错误
  description: 'API 请求完成后，会随响应返回以下 HTTP 状态码。


    | 状态码 | 含义 | 说明 |

    | --- | --- | --- |

    | 200 | OK | 请求成功。 |

    | 400 | Bad Request | 请求无效。请检查请求参数与 JSON 格式。 |

    | 401 | Unauthorized | 尚未通过认证。请检查 API Key。 |

    | 403 | Forbidden | 没有使用该 API 的权限。请检查访问地址；也可能是超过流量限制，请降低请求速率。 |

    | 404 | Not Found | 指定的 API 不存在。请检查访问地址。 |

    | 405 | Method Not Allowed | 使用了无效的 HTTP 方法。请检查 HTTP 方法。 |

    | 406 | Not Acceptable | 请求的资源只能生成客户端无法接受的内容。请检查 `Accept` 请求头。 |

    | 409 | Conflict | 发生资源冲突，无法处理请求。 |

    | 413 | Payload Too Large | 超过了允许发送的文件大小上限。 |

    | 415 | Unsupported Media Type | 指定了服务器或资源不支持的媒体类型。请检查请求头中的媒体类型。 |

    | 500 | Internal Server Error | 服务器发生错误，无法完成请求。 |

    | 502 | Bad Gateway | 发生网关错误，例如使用代理服务器时，一台服务器从另一台服务器收到了无效响应。 |

    | 503 | Service Unavailable | 系统维护期间正在限制流入请求。 |

    | 504 | Gateway Timeout | 发生网关超时。 |'
- name: 客户
  description: '顧客を管理するAPIです。fincodeにおける顧客は多くのアプリケーションにおいて購入者となるユーザーアカウントに1:1で紐づけられます。\

    顧客には名前やメールアドレス、請求先住所を登録し管理でき、決済やカード情報・決済手段などのリソースが関連付けられます。

    '
- name: 卡片
  description: '顧客が持つカードを管理するAPIです。\

    カードにはクレジットカード/デビッドカード/プリペイドカードの有効期限や名義などの情報が含まれており、決済の実行時にカードのIDを指定することでそのカードに対して請求（決済）を行います。\

    \

    1つの顧客に対してカード情報は最大5件まで登録可能です。5件登録している状態で新しいカードを登録する場合は、既存のカードを削除してから再度登録してください。\

    \

    ※ カード登録時に3Dセキュア認証を行う場合は、[決済手段 登録API](#tag/PaymentMethod/operation/createCustomerPaymentMethod)を使用します。

    '
- name: 支付方式
  description: '顧客が持つ決済手段（*Payment Method*）を管理するAPIです。\

    決済実行の際に決済手段のIDを指定することで、その決済手段に対し請求（決済）をします。\

    \

    決済手段オブジェクトは`pay_type`パラメータの値によって下記の情報を表現します。


    - `Card`: この決済手段はカードを表します。`card`パラメータ内にカードに関する詳細な情報が含まれます。

    - `Directdebit`: この決済手段は口座振替における振替用口座を表します。`directdebit`パラメータ内に口座に関する詳細な情報が含まれます。

    - `Virtualaccount`: この決済手段は銀行振込（バーチャル口座）を表します。`virtualaccount`パラメータ内に口座に関する詳細な情報が含まれます。


    1つの顧客に対して同一`pay_type`の決済手段は最大5件まで登録可能です。5件登録している状態で新しい決済手段を登録する場合は、既存の決済手段を削除してから再度登録してください。\

    \

    ※カード情報の操作はカードAPIでも可能ですが、今後は非推奨となる予定です。新規実装および機能追加を行う場合は、決済手段APIの利用を推奨します。\

    \

    [更に詳しく解説したドキュメントをこちらから参照できます。](https://docs.fincode.jp/payment/payment_method)

    '
- name: 支付
  description: '決済を行うAPIです。\

    決済 登録APIで決済情報をfincodeに登録し、決済 実行APIで実際に購入者（顧客）に対して請求を行います。\

    \

    決済手段によっては決済実行後、3Dセキュア認証や購入者による現金払い込みなどが必要になります。

    '
- name: 3D Secure 认证
  description: '3Dセキュア認証を行うAPIです。\

    3Dセキュア認証はカード決済において不正利用を防止するために使用される本人認証の仕組みです。\

    \

    決済実行後、購入者が`acs_url`にアクセスすると、ブラウザ情報がfincodeへ送信され認証プロセスが開始します。認証のプロセスと実装のフローに関しては[Docs > 3Dセキュア2.0認証を使用する](https://docs.fincode.jp/payment/fraud_protection/3d_secure_2)から参照できます。

    '
- name: 重定向式支付
  description: 'fincodeが提供するリダイレクト型決済URLを作成するAPIです。\

    リクエスト時に`guide_mail_send_flag`（決済メール送信フラグ）に`1`（送信する）を指定することでリダイレクト型決済URLを添付したメールをfincodeから送信させられます。

    '
- name: 重定向式卡片登记
  description: 'リダイレクト型カード登録URLを作成するAPIです。


    - 顧客ID（`customer_id`）を指定して作成した場合、その顧客に対してカードを登録するためのカード登録URLを発行します。

    - 顧客IDを指定しなかった場合、顧客を新たに作成しその顧客に対してカードを登録するためのカード登録URLを発行します。


    リクエスト時に`guide_mail_send_flag`（登録メール送信フラグ）に`1`（送信する）を指定することでリダイレクト型カード登録URLを添付したメールをfincodeから送信させられます。

    '
- name: 套餐
  description: 'サブスクリプションのプランを管理するAPIです。\

    サブスクリプション請求の金額・間隔・頻度などのプラン情報を登録・取得・更新・削除できます。

    '
- name: 订阅
  description: 'サブスクリプションを管理するAPIです。\

    指定した顧客に対して指定したプランで定期・定額で請求を行うサブスクリプションを登録・更新・削除できるほか、結果照会APIを用いてあるサブスクリプションによって発生した毎回の課金の結果を一覧で取得することもできます。\

    \

    サブスクリプション課金の処理は非同期で行われ、Webhookイベント`recurring.card.batch`（サブスクリプション課金（カード決済） 実行）や`recurring.directdebit.batch`（サブスクリプション課金（口座振替）
    実行）で課金結果を受け取ることができます。

    '
- name: 批量支付
  description: '一括決済を行うAPIです。\

    数千・数万件単位の決済を1回のリクエストで登録・予約することができ、従量課金のビジネスモデルの構築などに利用できます。\

    \

    一括決済の処理は非同期で行われ、Webhookイベント`payments.bulk.*.batch`（一括決済課金 実行）で課金結果を受け取ることができます。

    '
- name: 发票功能
  description: 'インボイス機能に関するAPI群です。\

    機能の詳細は[こちら](/payment/invoice)をご確認ください。\

    インボイス情報をもとに決済機能付きの請求書と領収書が発行されます。

    '
- name: 销售款入账
  description: 'ショップの売上入金を取得できます。\

    また、ある売上入金の詳細情報を取得し、取引1件ごとの入金額への影響を確認することもできます。

    '
- name: 平台使用费收入
  description: 'プラットフォーム利用料による売上入金を取得できます。\

    また、ある売上入金のIDを指定して、テナントショップごとの入金のサマリー情報を一覧取得することもできます。

    '
- name: 拒付
  description: 'チャージバックに関する情報を取得できるAPIです。\

    チャージバックに関する詳細は[Docs](https://docs.fincode.jp/business_management/chargeback)をご確認ください。


    ショップ管理画面のチャージバックステータスは、APIの`status_code`と`canceled`パラメータで取得できます。\

    ステータスごとの対応は以下の通りです。


    **要対応**

    - `status_code`: 4005

    - `canceled`: 使用なし


    **回答済み**

    - `status_code`: 4006、4007、4011

    - `canceled`: 使用なし


    **売上返還確定**

    - `status_code`: 4009

    - `canceled`: false


    **その他（確定後取消）**

    - `status_code`: 4009

    - `canceled`: true

    '
- name: 平台商户
  description: 'プラットフォームショップ（メインショップ・サブショップ）の設定を管理するAPIです。\

    テナントに対し適用するプラットフォーム利用料金の設定や、プラットフォームショップの一覧取得などができます。

    '
- name: 租户商户
  description: 'テナントショップの設定を管理するAPIです。\

    テナントに対し適用するプラットフォーム利用料金の設定や、テナントショップの一覧取得などができます。

    '
- name: 租户申请管理
  description: 'テナントショップの新規作成や審査情報の提出、販売免許等のアップロードなどを行えるAPIです。\

    \

    <span class="attension">このAPIの利用について</span>\

    このAPIを本番環境で利用するためにはfincodeへの申請が必要です。利用を希望する場合は[問い合わせフォーム](https://form.fincode.jp/contact) からテナント申請管理APIを利用するサービスの概要をお知らせの上、機能開放をリクエストしてください。（テスト環境では常時利用できます。）

    '
- name: 公司印章
  description: 'ショップに紐づく社印を管理するAPIです。\

    登録された社印は、インボイス機能などで発行される請求書・領収書・インボイスWEBページに自動で押印されます。\

    画像はマルチパート形式でアップロードします。サポートする拡張子は `png` / `jpg` / `jpeg` です。

    '
- name: Webhook 设置
  description: 'Webhook設定を管理するAPIです。\

    fincode上で指定したイベントが発生した場合、指定したエンドポイントでリアルタイムで通知を受け取れます。\

    [Webhook通知仕様はこちら](https://docs.fincode.jp/api#tag/Webhook_)\

    \

    ※1 テナントのイベントを受けとるためにはテナントごとにWebhook設定を登録する必要があります。


    | 機能                         | イベント名                  | イベントパラメータ                         |

    |----------------------------|--------------------------|-----------------------------------------|

    | カード決済                     | 決済登録                     | payments.card.regist                   |

    | カード決済                     | 決済実行                     | payments.card.exec                     |

    | カード決済                     | 売上確定                     | payments.card.capture                  |

    | カード決済                     | キャンセル                     | payments.card.cancel                   |

    | カード決済                     | 再オーソリ                     | payments.card.auth                     |

    | カード決済                     | 金額変更                     | payments.card.change                   |

    | 3Dセキュア（カード決済）                     | 認証実行                     | payments.card.secure2.authenticate     |

    | 3Dセキュア（カード決済）                     | チャレンジ結果確定               | payments.card.secure2.result           |

    | 3Dセキュア（カード決済）                     | 認証後決済実行                 | payments.card.secure                   |

    | Apple Pay                   | 決済登録                     | payments.applepay.regist               |

    | Apple Pay                   | 決済実行                     | payments.applepay.exec                 |

    | Apple Pay                   | 売上確定                     | payments.applepay.capture              |

    | Apple Pay                   | キャンセル                     | payments.applepay.cancel               |

    | Google Pay                     | 決済登録                     | payments.googlepay.regist                   |

    | Google Pay                     | 決済実行                     | payments.googlepay.exec                     |

    | Google Pay                     | 売上確定                     | payments.googlepay.capture                  |

    | Google Pay                     | キャンセル                     | payments.googlepay.cancel                   |

    | Google Pay                     | 再オーソリ                     | payments.googlepay.auth                     |

    | Google Pay                     | 金額変更                     | payments.googlepay.change                   |

    | 3Dセキュア（Google Pay）                     | 認証実行                     | payments.googlepay.secure2.authenticate     |

    | 3Dセキュア（Google Pay）                     | チャレンジ結果確定               | payments.googlepay.secure2.result           |

    | 3Dセキュア（Google Pay）                     | 認証後決済実行                 | payments.googlepay.secure                   |

    | コンビニ決済                   | 決済登録                     | payments.konbini.regist                |

    | コンビニ決済                   | 決済実行                     | payments.konbini.exec                  |

    | コンビニ決済                   | キャンセル                     | payments.konbini.cancel                |

    | コンビニ決済                   | 支払通知                     | payments.konbini.complete              |

    | コンビニ決済                   | 支払通知（シミュレート）         | payments.konbini.complete.stub         |

    | コンビニ決済                   | 支払い期限切れ                 | konbini.expired.update.batch           |

    | PayPay                      | 決済登録                     | payments.paypay.regist                 |

    | PayPay                      | 決済実行                     | payments.paypay.exec                   |

    | PayPay                      | 売上確定                     | payments.paypay.capture                |

    | PayPay                      | キャンセル                     | payments.paypay.cancel                 |

    | PayPay                      | 金額変更                     | payments.paypay.change                 |

    | PayPay                      | 支払通知                     | payments.paypay.complete               |

    | 口座振替                     | 決済登録                     | payments.directdebit.regist            |

    | 口座振替                     | 決済実行                     | payments.directdebit.exec              |

    | 口座振替                     | キャンセル                     | payments.directdebit.cancel            |

    | 口座振替                     | 金額変更                     | payments.directdebit.change            |

    | 口座振替                     | 引き落とし通知                 | payments.directdebit.complete          |

    | 口座振替                     | 引き落とし通知（シミュレート）     | payments.directdebit.complete.stub     |

    | 銀行振込（バーチャル口座）      | 決済登録                     | payments.virtualaccount.regist         |

    | 銀行振込（バーチャル口座）      | 決済実行                     | payments.virtualaccount.exec           |

    | 銀行振込（バーチャル口座）      | キャンセル                     | payments.virtualaccount.cancel         |

