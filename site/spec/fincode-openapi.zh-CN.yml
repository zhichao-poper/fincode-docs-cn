            - `data[].client_field_2`: 自由項目2\n- `data[].client_field_3`: 自由項目3\n- `data[].payment_term_day`: 支払期限日数\n- `data[].reference_order_id`:\
            \ バーチャル口座 再利用 オーダーID\n- `data[].use_exact_deposit_amount`: 入金可能額設定\n"
