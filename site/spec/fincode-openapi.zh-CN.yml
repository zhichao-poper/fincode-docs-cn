          minLength: 1
          maxLength: 23
          example: 1000
          description: '单笔支付的商品或服务单价。


            示例：`1000`（1000 日元）'
        deals_long_apply_content:
          type: boolean
          nullable: true
          example: true
          description: '是否经营需要较长 fincode 审核时间的商品或服务。


            - `true`：经营此类商品或服务

            - `false`：不经营此类商品或服务


            经营以下内容时必须指定为 `true`：和服、咨询服务、美容护理/美容院/医疗美容、体育设施/健身俱乐部、文化学校/函授课程、数据销售、以信息本身为商品的信息内容、占卜、营养补充剂/健康食品、美容用品/化妆品、假发、属于旅行业的服务、烟草/CBD、捐款。'
        deals_insecure_content:
          type: boolean
          nullable: true
          example: true
          description: '是否确认不经营 fincode 禁止处理的商品或服务。


            - `true`：没有经营禁止品类的计划

            - `false`：计划经营禁止品类


            fincode 禁止经营的品类如下：


            - 金融行为，例如信用卡购物额度套现

            - 虚拟货币交易、票券（包括印花税票和邮票）、商品券、预付卡、有价证券

            - 赌博及博彩

            - RMT（真实货币交易）

            - 宠物等所有活体，包括标本和剥制品

            - 布施

            - 危险药物及设计师药物

            - 无处方购买处方药，例如 Lumigan、Latisse、Glash Vista、Careprost 等

            - 可能侵犯第三方著作权、肖像权或知识产权的商品或内容

            - 违反公序良俗的商品或服务，包括成人内容和交友网站

            - 违反法律法规的商品或服务，包括违反枪刀法、麻药取缔法、华盛顿公约或药事法的内容'
        lost_trial:
          type: boolean
          nullable: true
          example: true
          description: '是否存在依据日本修订分期付款销售法提起诉讼并败诉的历史。


            - `true`：不存在败诉记录

            - `false`：存在败诉记录'
        use_of_fincode:
          type: object
          properties:
            used_on_web:
              type: boolean
              nullable: true
              example: true
              description: '是否在网站或 Web 应用中使用 fincode。


                - `true`：在网站或 Web 应用中使用 fincode'
            used_on_app:
              type: boolean
              nullable: true
              example: true
              description: '是否在原生应用中使用 fincode。


                - `true`：在原生应用中使用 fincode'
        site_published:
          type: boolean
          nullable: true
          example: true
          description: '网站公开状态，表示 fincode 审核时能否访问提供支付功能的网站。

            当 `usage_of_fincode.used_on_web` 为 `true` 时必填。


            - `true`：fincode 审核团队可以访问网站

            - `false`：fincode 审核团队无法访问网站'
        site_info:
          type: object
