        source: "import requests\n\ndef main():\n    api_key = '<Secret API Key>'\n\n    file_path = '<Path to file>'\n  \
          \  file_name = '<File Name>'\n    \n    with open(file_path, 'rb') as file:\n        files = {'file': (file_name,\
          \ file)}\n\n        url = f'https://api.test.fincode.jp/v1/payments/bulk'\n        query_params = {\n          \
          \  'pay_type': 'Card',\n            'process_plan_date': \"2022/05/22\"\n        }\n\n        # ヘッダーを設定\n      \
