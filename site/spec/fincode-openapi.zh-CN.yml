              description: fincode 审核团队用于访问网站的 URL。
            credential:
              type: string
              nullable: true
              minLength: 1
              maxLength: 100
              example: 'ID: example_user,Password: password'
              description: fincode 审核团队访问网站所需的登录信息。
          required:
          - url
          description: 使用 fincode 支付的网站信息，供 fincode 审核团队核查。
        prepaid_point:
          type: boolean
          nullable: true
          example: true
          description: 是否在商户中使用预付积分。
        prepaid_point_info:
          type: object
          properties:
            how_to_use:
              type: string
              nullable: true
