        この決済URL上で使用できる決済手段を指定します。複数指定可能です。


        - `Card`：カード決済

        - `Konbini`：コンビニ決済

        - `Paypay`：PayPay

        - `Virtualaccount`：バーチャル口座決済

        '
    CardPaymentSessionJobCode:
      type: string
      enum:
      - AUTH
      - CAPTURE
      example: CAPTURE
      default: AUTH
      description: '取引種別\

        この決済URL上でカード決済を行った際、仮売上にするか即座に売上確定するか指定します。


        - `AUTH`：仮売上にする（デフォルト）

        - `CAPTURE`：即時売上

        '
    PaymentSession.Konbini_x-req-properties-payment_term_day:
      type: string
      nullable: true
      minLength: 1
      maxLength: 3
      example: '2'
      description: 'コンビニ決済 支払期限日数\

        店頭レジでの支払い期限日数です。

        '
