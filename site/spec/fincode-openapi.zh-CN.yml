            ,\n            \"client_field_1\": \"自由項目1\",\n            \"client_field_2\": \"自由項目2\",\n            \"client_field_3\"\
            : \"自由項目3\"\n        },\n        {\n            \"id\": \"order_002\",\n            \"amount\": \"1000\",\n  \
            \          \"customer_id\": \"c_**********************\",\n            \"card_id\": \"cs_**********************\"\
            \n        },\n        ...\n    ]\n}\n```\nパラメータ仕様は以下の通りで、各パラメータの形式は決済登録・決済実行APIに準拠します。（*は必須項目）\n\n- `data`: 決済情報のリストを格納する配列\n\
            - `data[].id`: オーダーID\n- `data[].amount`: 利用金額*\n- `data[].tax`: 税送料\n- `data[].customer_id`: 顧客ID*\n- `data[].card_id`:\
            \ カードID\n- `data[].client_field_1`: 自由項目1\n- `data[].client_field_2`: 自由項目2\n- `data[].client_field_3`: 自由項目3\n\
            \npay_type=`Virtualaccount`の場合\n```json\n{\n    \"data\": [\n        {\n            \"id\": \"order_001\",\n \
            \           \"billing_amount\": \"1000\",\n            \"billing_tax\": \"100\",\n            \"customer_id\"\
            : \"c_**********************\",\n            \"payment_method_id\": \"pm_**********************\",\n         \
            \   \"client_field_1\": \"自由項目1\",\n            \"client_field_2\": \"自由項目2\",\n            \"client_field_3\"\
            : \"自由項目3\"\n        },\n        {\n            \"id\": \"order_002\",\n            \"billing_amount\": \"1000\"\
            ,\n            \"payment_term_day\":\"2\",\n            \"reference_order_id\":\"order_101\",\n            \"\
            use_exact_deposit_amount\": true\n        },\n        ...\n    ]\n}\n```\nパラメータ仕様は以下の通りで、各パラメータの形式は決済登録・決済実行APIに準拠します。（*は必須項目）\n\
